<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ox_target — Redesign minimalista</title>
<style>
  :root{
    --bg: #0c0c0e;
    --panel: #17161a;
    --edge: #232025;
    --text: #e6e4e3;
    --text-dim: #86828a;
    --text-faint: #4c4850;
    --red: #ff2438;
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    overflow:hidden;
    position:relative;
    user-select:none;
  }

  .world{
    position:absolute; inset:0;
    background: linear-gradient(180deg, #0e0d10 0%, #0a090b 100%);
  }

  .hint{
    position:absolute; top:20px; left:50%; transform:translateX(-50%);
    font-size:11px; letter-spacing:.03em;
    color: var(--text-faint);
  }

  /* ---------- hotspots ---------- */
  .hotspot{
    position:absolute;
    width:38px; height:38px;
    margin:-19px 0 0 -19px;
    border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
    background: var(--panel);
    border:1px solid var(--edge);
    cursor:pointer;
    transition: border-color .12s ease;
  }
  .hotspot.targeted{ border-color: var(--red); }

  /* ---------- reticle ---------- */
  .reticle-wrap{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center;
    pointer-events:none;
  }
  .reticle{
    width:6px; height:6px; border-radius:50%;
    background: var(--text-faint);
    transition: background .12s ease, box-shadow .12s ease;
  }
  .reticle-wrap.active .reticle{
    background: var(--red);
    box-shadow: 0 0 0 5px rgba(255,36,56,.14);
  }

  .reticle-label{
    margin-top:10px;
    font-size:11px; letter-spacing:.02em;
    color: var(--text-dim);
    opacity:0; transform:translateY(-2px);
    transition: opacity .12s ease, transform .12s ease;
    white-space:nowrap;
  }
  .reticle-wrap.active .reticle-label{ opacity:1; transform:translateY(0); }
  .reticle-label b{ color: var(--text); font-weight:600; }
  .reticle-label .dist{ color: var(--text-faint); font-family: ui-monospace, Consolas, monospace; }

  /* ---------- interaction menu ---------- */
  .menu{
    position:fixed; top:50%; left:50%;
    transform: translate(-50%, 26px);
    width:168px;
    background: var(--panel);
    border:1px solid var(--edge);
    border-radius:4px;
    overflow:hidden;
    z-index:40;
    opacity:0;
    animation: fade .12s ease forwards;
  }
  @keyframes fade{ to{ opacity:1; } }

  .menu-item{
    padding:9px 12px;
    font-size:12px;
    color: var(--text-dim);
    border-left:2px solid transparent;
    cursor:pointer;
    transition: color .1s ease, border-color .1s ease, background .1s ease;
  }
  .menu-item + .menu-item{ border-top:1px solid var(--edge); }
  .menu-item:hover, .menu-item:focus-visible{
    color: var(--text);
    border-left-color: var(--red);
    background: rgba(255,36,56,.05);
    outline:none;
  }

  /* ---------- toast ---------- */
  .toast{
    position:absolute; top:56px; left:50%; transform:translateX(-50%);
    font-size:11px; color: var(--text-dim);
    padding:6px 12px;
    border:1px solid var(--edge);
    border-radius:3px;
    opacity:0;
    transition: opacity .15s ease;
    pointer-events:none;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

  <div class="world"></div>

  <div class="hint">Passe o mouse num objeto para mirar · clique para interagir · Esc fecha</div>

  <div class="reticle-wrap" id="reticleWrap">
    <div class="reticle"></div>
    <div class="reticle-label" id="reticleLabel"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const TARGETS = [
      { id:'trunk', icon:'🧳', name:'Porta-malas', x:'25%', y:'62%', dist:'1.8m',
        options:['Abrir porta-malas', 'Trancar veículo', 'Revistar veículo'] },
      { id:'dumpster', icon:'🗑️', name:'Lixeira', x:'74%', y:'68%', dist:'2.4m',
        options:['Vasculhar', 'Descartar item'] },
      { id:'ped', icon:'🧍', name:'Pedestre', x:'50%', y:'38%', dist:'1.2m',
        options:['Revistar bolso', 'Algemar', 'Conversar'] },
    ];

    const world = document.querySelector('.world');
    const reticleWrap = document.getElementById('reticleWrap');
    const reticleLabel = document.getElementById('reticleLabel');
    const toastEl = document.getElementById('toast');

    let currentTarget = null;
    let menuOpen = false;
    let toastTimer = null;

    function showToast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1500);
    }

    function setActive(t, el){
      currentTarget = t;
      reticleWrap.classList.add('active');
      reticleLabel.innerHTML = `<b>${t.name}</b> <span class="dist">${t.dist}</span>`;
      document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('targeted'));
      el.classList.add('targeted');
    }

    function clearActive(){
      if(menuOpen) return;
      currentTarget = null;
      reticleWrap.classList.remove('active');
      reticleLabel.innerHTML = '';
      document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('targeted'));
    }

    function renderHotspots(){
      TARGETS.forEach(t => {
        const el = document.createElement('div');
        el.className = 'hotspot';
        el.style.left = t.x;
        el.style.top = t.y;
        el.textContent = t.icon;

        el.addEventListener('mouseenter', () => setActive(t, el));
        el.addEventListener('mouseleave', () => { if(!menuOpen) clearActive(); });
        el.addEventListener('click', () => {
          if(currentTarget && currentTarget.id === t.id) openMenu(t);
        });

        world.appendChild(el);
      });
    }

    function openMenu(target){
      menuOpen = true;

      const menu = document.createElement('div');
      menu.className = 'menu';
      menu.id = 'targetMenu';

      target.options.forEach(label => {
        const item = document.createElement('div');
        item.className = 'menu-item';
        item.tabIndex = 0;
        item.textContent = label;
        item.addEventListener('click', () => {
          closeMenu();
          showToast(`Executando: ${label}...`);
        });
        menu.appendChild(item);
      });

      document.body.appendChild(menu);

      document.addEventListener('mousedown', outsideClick);
    }

    function outsideClick(e){
      const menu = document.getElementById('targetMenu');
      if(menu && !menu.contains(e.target) && !e.target.closest('.hotspot')){
        closeMenu();
      }
    }

    function closeMenu(){
      const menu = document.getElementById('targetMenu');
      if(menu) menu.remove();
      document.removeEventListener('mousedown', outsideClick);
      menuOpen = false;
      clearActive();
    }

    document.addEventListener('keydown', e => {
      if(e.key === 'Escape' && menuOpen) closeMenu();
    });

    renderHotspots();
  </script>
</body>
</html>
