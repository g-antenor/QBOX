<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Minimarket — Redesign</title>
<style>
  :root{
    --bg: #0c0c0e;
    --panel: #17161a;
    --edge: #232025;
    --text: #e6e4e3;
    --text-dim: #86828a;
    --text-faint: #4c4850;
    --red: #ff2438;
    --green: #3ddc84;
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    overflow:hidden;
    user-select:none;
  }

  .app{ display:flex; height:100%; }

  /* ---------- categories column ---------- */
  .categories{ width:190px; flex:none; background:var(--panel); border-right:1px solid var(--edge); overflow-y:auto; }
  .sidebar-title{ padding:16px 14px 3px; font-size:12px; font-weight:700; letter-spacing:.03em; color:var(--text); }
  .sidebar-sub{ padding:0 14px 12px; font-size:10.5px; color:var(--text-faint); line-height:1.4; }
  .section-label{ padding:13px 14px 6px; font-size:9px; letter-spacing:.09em; text-transform:uppercase; color:var(--text-faint); }

  .side-item{
    padding:9px 14px; font-size:12px; color:var(--text-dim);
    border-left:2px solid transparent; border-bottom:1px solid var(--edge);
    cursor:pointer; display:flex; align-items:center; gap:8px;
    transition: color .1s ease, border-color .1s ease, background .1s ease;
  }
  .side-item:hover, .side-item:focus-visible{ color:var(--text); border-left-color:var(--red); background:rgba(255,36,56,.05); outline:none; }
  .side-item.active{ color:var(--text); border-left-color:var(--red); background:rgba(255,36,56,.07); }

  /* ---------- product stage ---------- */
  .stage{ flex:1; background: linear-gradient(180deg,#0e0d10,#0a090b); overflow-y:auto; padding:20px 22px; }
  .stage-header{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; }
  .stage-title{ font-size:13px; font-weight:700; letter-spacing:.03em; color:var(--text); }
  .search-input{
    width:220px; background:#0f0e10; border:1px solid var(--edge); color:var(--text);
    font-size:12px; padding:8px 10px; border-radius:3px; font-family:inherit;
  }
  .search-input:focus{ outline:none; border-color:var(--red); }
  .search-input::placeholder{ color:var(--text-faint); }

  .product-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(128px,1fr)); gap:10px; }
  .product-card{
    background:var(--panel); border:1px solid var(--edge); border-radius:5px;
    padding:12px 10px; cursor:pointer; text-align:center;
    transition: border-color .12s ease, transform .1s ease;
  }
  .product-card:hover{ border-color: var(--red); transform:translateY(-1px); }
  .product-card.added{ border-color: var(--red); }
  .product-icon{ font-size:24px; margin-bottom:8px; }
  .product-name{ font-size:11.5px; color:var(--text); margin-bottom:5px; line-height:1.3; min-height:28px; }
  .product-price{ font-size:12px; font-family: ui-monospace, Consolas, monospace; color:var(--red); font-weight:700; }
  .product-add-hint{ font-size:8.5px; color:var(--text-faint); margin-top:6px; text-transform:uppercase; letter-spacing:.03em; }
  .empty-note{ font-size:11px; color:var(--text-faint); padding:20px 0; text-align:center; grid-column:1/-1; }

  /* ---------- receipt panel ---------- */
  .receipt-panel{ width:308px; flex:none; background:var(--panel); border-left:1px solid var(--edge); overflow-y:auto; padding:16px 14px 20px; }

  .receipt-paper{
    background:#121114; border:1px dashed var(--edge); border-radius:2px;
    padding:16px 14px; font-family: ui-monospace, Consolas, monospace;
    position:relative;
  }
  .receipt-store{ font-size:13px; font-weight:700; letter-spacing:.05em; text-align:center; color:var(--text); }
  .receipt-meta{ font-size:9.5px; color:var(--text-faint); text-align:center; line-height:1.5; margin-top:4px; }
  .receipt-divider{ border-top:1px dashed var(--edge); margin:10px 0; }

  .receipt-items{ display:flex; flex-direction:column; gap:9px; }
  .receipt-empty{ font-size:10.5px; color:var(--text-faint); text-align:center; padding:10px 0; }
  .receipt-item-name{ display:flex; justify-content:space-between; gap:6px; font-size:11px; color:var(--text); }
  .receipt-item-name .lt{ min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .receipt-item-sub{ display:flex; justify-content:space-between; align-items:center; margin-top:4px; }
  .receipt-item-unit{ font-size:9.5px; color:var(--text-faint); }
  .qty-stepper{ display:flex; align-items:center; gap:6px; }
  .qty-btn{
    width:16px; height:16px; display:flex; align-items:center; justify-content:center;
    border:1px solid var(--edge); border-radius:2px; color:var(--text-dim); cursor:pointer; font-size:10px; line-height:1;
  }
  .qty-btn:hover{ border-color:var(--red); color:var(--text); }
  .qty-val{ min-width:14px; text-align:center; color:var(--text); font-size:10.5px; }
  .remove-btn{ color:var(--text-faint); cursor:pointer; font-size:12px; margin-left:4px; }
  .remove-btn:hover{ color:var(--red); }

  .receipt-row{ display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); padding:3px 0; }
  .receipt-row.total{ font-size:14px; font-weight:700; color:var(--text); margin-top:4px; }
  .receipt-row.total span:last-child{ color:var(--red); }
  .receipt-row.discount span:last-child{ color:var(--red); }

  .receipt-barcode{
    height:32px; margin-top:12px; opacity:.55;
    background: repeating-linear-gradient(90deg, var(--text-faint) 0px, var(--text-faint) 2px, transparent 2px, transparent 4px, var(--text-faint) 4px, var(--text-faint) 5px, transparent 5px, transparent 9px);
  }
  .receipt-barcode-num{ text-align:center; font-size:9px; letter-spacing:.15em; color:var(--text-faint); margin-top:5px; }

  .receipt-stamp{
    position:absolute; top:18px; right:14px;
    border:2px solid var(--red); color:var(--red);
    font-size:11px; font-weight:700; letter-spacing:.06em;
    padding:4px 9px; border-radius:4px; transform:rotate(-8deg); opacity:.9;
  }
  .hidden{ display:none; }

  .field-row{ padding:0 0 12px; }
  .field-label{ font-size:10px; letter-spacing:.03em; text-transform:uppercase; color:var(--text-faint); margin-bottom:6px; }
  .field-input{ flex:1; background:#0f0e10; border:1px solid var(--edge); color:var(--text); font-size:12px; padding:7px 8px; border-radius:3px; font-family:inherit; }
  .field-input:focus{ outline:none; border-color:var(--red); }
  .coupon-row{ display:flex; gap:6px; }
  .coupon-msg{ font-size:10px; margin-top:6px; min-height:12px; }
  .coupon-msg.ok{ color:var(--green); }
  .coupon-msg.err{ color:var(--red); }

  .mic-seg{ display:flex; flex-wrap:wrap; gap:6px; padding-bottom:14px; }
  .mic-seg button{
    flex:1 1 28%; padding:7px 0; font-size:10px; text-transform:uppercase; letter-spacing:.03em;
    background:transparent; border:1px solid var(--edge); color:var(--text-dim); border-radius:3px; cursor:pointer;
  }
  .mic-seg button.active{ border-color:var(--red); color:var(--text); background:rgba(255,36,56,.08); }

  .btn{
    padding:9px 0; font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
    border-radius:3px; border:1px solid var(--edge); background:transparent; color:var(--text-dim);
    cursor:pointer; transition: border-color .1s ease, color .1s ease, background .1s ease;
  }
  .btn:hover{ color:var(--text); border-color:var(--text-faint); }
  .btn.primary{ background:var(--red); border-color:var(--red); color:#fff; width:100%; }
  .btn.primary:hover{ background:#e01d30; }
  .btn.primary:disabled{ opacity:.35; cursor:not-allowed; background:var(--red); }
</style>
</head>
<body>

  <div class="app">
    <div class="categories">
      <div class="sidebar-title">Minimarket 24h</div>
      <div class="sidebar-sub">Selecione uma categoria ou busque um produto.</div>
      <div class="section-label">Categorias</div>
      <div id="categoryList"></div>
    </div>

    <div class="stage">
      <div class="stage-header">
        <div class="stage-title" id="stageTitle">Todos os produtos</div>
        <input type="text" class="search-input" id="searchInput" placeholder="Buscar produto...">
      </div>
      <div class="product-grid" id="productGrid"></div>
    </div>

    <div class="receipt-panel">
      <div class="receipt-paper" id="receiptPaper">
        <div class="receipt-stamp hidden" id="receiptStamp">PAGO ✓</div>
        <div class="receipt-store">MINIMARKET 24H</div>
        <div class="receipt-meta">CNPJ 00.000.000/0001-00<br>Rua Central, 123 — Los Santos</div>
        <div class="receipt-meta" id="receiptDate"></div>
        <div class="receipt-divider"></div>
        <div class="receipt-items" id="receiptItems"></div>
        <div class="receipt-divider"></div>
        <div class="receipt-row"><span>Subtotal</span><span id="rSubtotal">R$ 0,00</span></div>
        <div class="receipt-row discount hidden" id="rDiscountRow"><span>Desconto</span><span id="rDiscount">- R$ 0,00</span></div>
        <div class="receipt-row total"><span>TOTAL</span><span id="rTotal">R$ 0,00</span></div>
        <div class="receipt-barcode"></div>
        <div class="receipt-barcode-num">4009 8765 4321 0987</div>
      </div>

      <div class="field-row" style="padding-top:14px;">
        <div class="field-label">Cupom de desconto</div>
        <div class="coupon-row">
          <input type="text" class="field-input" id="couponInput" placeholder="Código">
          <button class="btn" id="btnApplyCoupon" style="flex:none; padding:0 12px;">Aplicar</button>
        </div>
        <div class="coupon-msg" id="couponMsg"></div>
      </div>

      <div class="field-label" style="padding:0 0 8px;">Forma de pagamento</div>
      <div class="mic-seg" id="paymentSeg">
        <button data-pay="dinheiro" class="active">Dinheiro</button>
        <button data-pay="cartao">Cartão</button>
        <button data-pay="pix">Pix</button>
      </div>

      <button class="btn primary" id="btnCheckout" disabled>Finalizar compra</button>
    </div>
  </div>

  <script>
    const CATEGORIES = [
      { id:'todos', label:'Todos', icon:'🛒' },
      { id:'padaria', label:'Padaria', icon:'🍞' },
      { id:'bebidas', label:'Bebidas', icon:'🥤' },
      { id:'laticinios', label:'Laticínios', icon:'🧀' },
      { id:'hortifruti', label:'Hortifruti', icon:'🥦' },
      { id:'mercearia', label:'Mercearia', icon:'🥫' },
      { id:'limpeza', label:'Limpeza', icon:'🧴' },
      { id:'higiene', label:'Higiene', icon:'🧻' },
      { id:'congelados', label:'Congelados', icon:'🧊' },
    ];

    const PRODUCTS = [
      { id:1, name:'Pão Francês (un)', price:0.80, category:'padaria', icon:'🥖' },
      { id:2, name:'Croissant', price:6.50, category:'padaria', icon:'🥐' },
      { id:3, name:'Bolo de Chocolate', price:18.90, category:'padaria', icon:'🍰' },
      { id:4, name:'Água Mineral 500ml', price:2.50, category:'bebidas', icon:'💧' },
      { id:5, name:'Refrigerante Cola 2L', price:8.99, category:'bebidas', icon:'🥤' },
      { id:6, name:'Suco de Laranja 1L', price:7.49, category:'bebidas', icon:'🧃' },
      { id:7, name:'Cerveja Long Neck', price:5.99, category:'bebidas', icon:'🍺' },
      { id:8, name:'Leite Integral 1L', price:4.79, category:'laticinios', icon:'🥛' },
      { id:9, name:'Queijo Mussarela (kg)', price:32.90, category:'laticinios', icon:'🧀' },
      { id:10, name:'Iogurte Natural', price:3.99, category:'laticinios', icon:'🍦' },
      { id:11, name:'Banana (kg)', price:5.49, category:'hortifruti', icon:'🍌' },
      { id:12, name:'Tomate (kg)', price:6.99, category:'hortifruti', icon:'🍅' },
      { id:13, name:'Alface', price:2.99, category:'hortifruti', icon:'🥬' },
      { id:14, name:'Arroz 5kg', price:24.90, category:'mercearia', icon:'🍚' },
      { id:15, name:'Feijão 1kg', price:8.49, category:'mercearia', icon:'🫘' },
      { id:16, name:'Macarrão 500g', price:4.29, category:'mercearia', icon:'🍝' },
      { id:17, name:'Óleo de Soja 900ml', price:7.99, category:'mercearia', icon:'🫙' },
      { id:18, name:'Detergente', price:2.49, category:'limpeza', icon:'🧴' },
      { id:19, name:'Sabão em Pó 1kg', price:12.90, category:'limpeza', icon:'🧼' },
      { id:20, name:'Papel Higiênico (4un)', price:9.99, category:'higiene', icon:'🧻' },
      { id:21, name:'Sabonete', price:2.99, category:'higiene', icon:'🧼' },
      { id:22, name:'Pizza Congelada', price:15.90, category:'congelados', icon:'🍕' },
      { id:23, name:'Sorvete 2L', price:19.90, category:'congelados', icon:'🍨' },
    ];

    const VALID_COUPONS = { 'DESCONTO10':10, 'BEMVINDO5':5 };

    let CART = {};
    let activeCategory = 'todos';
    let searchTerm = '';
    let discountPercent = 0;
    let paid = false;

    function fmt(v){ return 'R$ ' + v.toFixed(2).replace('.', ','); }

    /* ---------------- categories ---------------- */
    function renderCategories(){
      const list = document.getElementById('categoryList');
      list.innerHTML = '';
      CATEGORIES.forEach(c => {
        const item = document.createElement('div');
        item.className = 'side-item' + (c.id === activeCategory ? ' active' : '');
        item.innerHTML = `<span>${c.icon}</span><span>${c.label}</span>`;
        item.addEventListener('click', () => {
          activeCategory = c.id;
          renderCategories();
          renderProducts();
        });
        list.appendChild(item);
      });
    }

    /* ---------------- products ---------------- */
    function updateStageTitle(){
      const title = document.getElementById('stageTitle');
      if(searchTerm){ title.textContent = `Resultados para "${searchTerm}"`; return; }
      const cat = CATEGORIES.find(c => c.id === activeCategory);
      title.textContent = cat.id === 'todos' ? 'Todos os produtos' : cat.label;
    }

    function renderProducts(){
      updateStageTitle();
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      const filtered = PRODUCTS.filter(p => {
        const matchesCat = activeCategory === 'todos' || p.category === activeCategory;
        const matchesSearch = !searchTerm || p.name.toLowerCase().includes(searchTerm);
        return matchesCat && matchesSearch;
      });
      if(filtered.length === 0){
        grid.innerHTML = '<div class="empty-note">Nenhum produto encontrado</div>';
        return;
      }
      filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <div class="product-icon">${p.icon}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">${fmt(p.price)}</div>
          <div class="product-add-hint">Clique para adicionar</div>
        `;
        card.addEventListener('click', () => addToCart(p, card));
        grid.appendChild(card);
      });
    }

    document.getElementById('searchInput').addEventListener('input', e => {
      searchTerm = e.target.value.trim().toLowerCase();
      renderProducts();
    });

    /* ---------------- cart / receipt ---------------- */
    function addToCart(product, cardEl){
      if(paid) return;
      if(CART[product.id]) CART[product.id].qty += 1;
      else CART[product.id] = { product, qty:1 };
      if(cardEl){
        cardEl.classList.add('added');
        setTimeout(() => cardEl.classList.remove('added'), 200);
      }
      renderCart();
    }

    function changeQty(id, delta){
      if(paid) return;
      const entry = CART[id];
      if(!entry) return;
      entry.qty += delta;
      if(entry.qty <= 0) delete CART[id];
      renderCart();
    }

    function removeItem(id){
      if(paid) return;
      delete CART[id];
      renderCart();
    }

    function getSubtotal(){
      return Object.values(CART).reduce((sum, e) => sum + e.product.price * e.qty, 0);
    }

    function renderCart(){
      const itemsBox = document.getElementById('receiptItems');
      itemsBox.innerHTML = '';
      const entries = Object.values(CART);

      if(entries.length === 0){
        itemsBox.innerHTML = '<div class="receipt-empty">Carrinho vazio — adicione itens ao lado</div>';
      } else {
        entries.forEach(e => {
          const row = document.createElement('div');
          const lineTotal = fmt(e.product.price * e.qty);
          row.innerHTML = `
            <div class="receipt-item-name"><span class="lt">${e.product.name}</span><span>${lineTotal}</span></div>
            <div class="receipt-item-sub">
              <span class="receipt-item-unit">${fmt(e.product.price)} un</span>
              <span class="qty-stepper">
                <span class="qty-btn" data-action="dec">-</span>
                <span class="qty-val">${e.qty}</span>
                <span class="qty-btn" data-action="inc">+</span>
                <span class="remove-btn" data-action="rm">×</span>
              </span>
            </div>
          `;
          row.querySelector('[data-action="dec"]').addEventListener('click', () => changeQty(e.product.id, -1));
          row.querySelector('[data-action="inc"]').addEventListener('click', () => changeQty(e.product.id, 1));
          row.querySelector('[data-action="rm"]').addEventListener('click', () => removeItem(e.product.id));
          itemsBox.appendChild(row);
        });
      }

      const subtotal = getSubtotal();
      const discountValue = subtotal * (discountPercent / 100);
      const total = subtotal - discountValue;

      document.getElementById('rSubtotal').textContent = fmt(subtotal);
      document.getElementById('rDiscountRow').classList.toggle('hidden', discountPercent === 0);
      document.getElementById('rDiscount').textContent = '- ' + fmt(discountValue);
      document.getElementById('rTotal').textContent = fmt(total);

      const checkoutBtn = document.getElementById('btnCheckout');
      if(!paid) checkoutBtn.disabled = entries.length === 0;
    }

    /* ---------------- coupon ---------------- */
    document.getElementById('btnApplyCoupon').addEventListener('click', () => {
      const code = document.getElementById('couponInput').value.trim().toUpperCase();
      const msg = document.getElementById('couponMsg');
      if(VALID_COUPONS[code] !== undefined){
        discountPercent = VALID_COUPONS[code];
        msg.textContent = `Cupom aplicado: -${discountPercent}%`;
        msg.className = 'coupon-msg ok';
      } else {
        discountPercent = 0;
        msg.textContent = 'Cupom inválido';
        msg.className = 'coupon-msg err';
      }
      renderCart();
    });

    /* ---------------- payment method ---------------- */
    document.querySelectorAll('#paymentSeg button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#paymentSeg button').forEach(b => b.classList.toggle('active', b === btn));
      });
    });

    /* ---------------- checkout ---------------- */
    const checkoutBtn = document.getElementById('btnCheckout');
    checkoutBtn.addEventListener('click', () => {
      if(!paid){
        if(Object.keys(CART).length === 0) return;
        paid = true;
        document.getElementById('receiptStamp').classList.remove('hidden');
        checkoutBtn.textContent = 'Nova compra';
      } else {
        CART = {};
        discountPercent = 0;
        paid = false;
        document.getElementById('receiptStamp').classList.add('hidden');
        document.getElementById('couponInput').value = '';
        document.getElementById('couponMsg').textContent = '';
        checkoutBtn.textContent = 'Finalizar compra';
        renderCart();
      }
    });

    /* ---------------- init ---------------- */
    document.getElementById('receiptDate').textContent = new Date().toLocaleString('pt-BR');
    renderCategories();
    renderProducts();
    renderCart();
  </script>
</body>
</html>
