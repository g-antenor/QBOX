<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat — Redesign</title>
<style>
  :root{
    --bg: #0c0c0e;
    --panel: #17161a;
    --edge: #232025;
    --text: #e6e4e3;
    --text-dim: #86828a;
    --text-faint: #4c4850;
    --red: #ff2438;
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    overflow:hidden;
    user-select:none;
  }

  .app{ display:flex; height:100%; }

  /* ---------- sidebar ---------- */
  .sidebar{ width:254px; flex:none; background:var(--panel); border-right:1px solid var(--edge); overflow-y:auto; }
  .sidebar-title{ padding:16px 14px 3px; font-size:12px; font-weight:700; letter-spacing:.03em; color:var(--text); }
  .sidebar-sub{ padding:0 14px 12px; font-size:10.5px; color:var(--text-faint); line-height:1.4; }
  .section-label{ padding:13px 14px 6px; font-size:9px; letter-spacing:.09em; text-transform:uppercase; color:var(--text-faint); }

  .side-item{
    padding:9px 14px; font-size:12px; color:var(--text-dim);
    border-left:2px solid transparent; border-bottom:1px solid var(--edge);
    cursor:pointer; transition: color .1s ease, border-color .1s ease, background .1s ease;
  }
  .side-item:hover, .side-item:focus-visible{ color:var(--text); border-left-color:var(--red); background:rgba(255,36,56,.05); outline:none; }

  .vis-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 14px; font-size:12px; color:var(--text-dim);
    border-bottom:1px solid var(--edge); cursor:pointer;
  }
  .vis-row:last-child{ border-bottom:none; }
  .vis-row input{ accent-color: var(--red); }

  .field-row{ padding:0 14px 12px; }
  .field-label{ font-size:10px; letter-spacing:.03em; text-transform:uppercase; color:var(--text-faint); margin-bottom:6px; display:flex; justify-content:space-between; }
  .field-input{ width:100%; background:#0f0e10; border:1px solid var(--edge); color:var(--text); font-size:12px; padding:7px 8px; border-radius:3px; font-family:inherit; }
  .field-input:focus{ outline:none; border-color:var(--red); }

  .mic-seg{ display:flex; flex-wrap:wrap; gap:6px; padding:2px 14px 12px; }
  .mic-seg button{
    flex:1 1 28%; padding:7px 0; font-size:10px; text-transform:uppercase; letter-spacing:.03em;
    background:transparent; border:1px solid var(--edge); color:var(--text-dim); border-radius:3px; cursor:pointer;
  }
  .mic-seg button.active{ border-color:var(--red); color:var(--text); background:rgba(255,36,56,.08); }

  /* ---------- stage ---------- */
  .stage{ flex:1; position:relative; background: linear-gradient(180deg,#0e0d10,#0a090b); overflow:hidden; }
  .stage-hint{ position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:11px; color:var(--text-faint); white-space:nowrap; }

  /* ---------- chat ---------- */
  .chat-wrap{ position:absolute; left:20px; bottom:24px; width:370px; }

  .chat-log{
    display:flex; flex-direction:column; gap:1px;
    max-height:230px; overflow:hidden;
    padding:8px 10px; border-radius:4px;
    background: rgba(15,14,16,.5);
    transition: opacity .4s ease;
  }
  .chat-log.compact{ max-height:150px; }
  .chat-log.faded{ opacity:.32; }

  .chat-msg{ font-size:12px; line-height:1.55; padding-left:8px; border-left:2px solid transparent; color:var(--text-dim); }
  .chat-msg.sistema{ color:var(--text-faint); font-style:italic; }
  .chat-msg.ooc{ border-left-color:#4a90d9; }
  .chat-msg.admin{ border-left-color:var(--red); }
  .chat-msg.admin .msg-author{ color:var(--red); }
  .chat-msg.erro{ color:var(--red); border-left-color:var(--red); }
  .msg-tag{ font-size:9px; letter-spacing:.04em; color:var(--text-faint); margin-right:5px; }
  .msg-author{ font-weight:700; color:var(--text); margin-right:4px; }
  .msg-text{ color:inherit; }

  .chat-input-wrap{ position:relative; margin-top:6px; }

  .chat-input-row{
    display:flex; align-items:center; gap:8px;
    background:var(--panel); border:1px solid var(--edge); border-radius:4px;
    padding:8px 10px; transition: border-color .12s ease;
  }
  .chat-input-row:focus-within{ border-color: var(--red); }

  .chat-channel-tag{
    font-size:9px; letter-spacing:.05em; text-transform:uppercase; color:var(--red);
    border:1px solid var(--edge); padding:3px 6px; border-radius:3px; flex:none; cursor:pointer;
  }
  .chat-input{ flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:12px; font-family:inherit; }
  .chat-input::placeholder{ color:var(--text-faint); }

  .chat-suggestions{
    position:absolute; bottom:100%; left:0; right:0; margin-bottom:6px;
    background:var(--panel); border:1px solid var(--edge); border-radius:4px; overflow:hidden;
    opacity:0; transform:translateY(4px); pointer-events:none;
    transition: opacity .12s ease, transform .12s ease;
  }
  .chat-suggestions.visible{ opacity:1; transform:translateY(0); pointer-events:auto; }
  .suggestion-item{ padding:8px 10px; border-bottom:1px solid var(--edge); cursor:pointer; }
  .suggestion-item:last-child{ border-bottom:none; }
  .suggestion-item:hover, .suggestion-item.active{ background:rgba(255,36,56,.06); }
  .suggestion-cmd{ font-size:11.5px; font-family: ui-monospace, Consolas, monospace; color:var(--text); }
  .suggestion-cmd .param{ color:var(--text-faint); font-weight:400; margin-left:5px; }
  .suggestion-desc{ font-size:10px; color:var(--text-faint); margin-top:2px; display:block; }
</style>
</head>
<body>

  <div class="app">
    <div class="sidebar">
      <div class="sidebar-title">Chat — Redesign</div>
      <div class="sidebar-sub">Envie mensagens de teste e experimente as sugestões de comando no campo abaixo.</div>

      <div class="section-label">Enviar mensagem de teste</div>
      <div class="field-row"><div class="field-label">Autor</div><input class="field-input" id="testAuthor" value="Jogador_01"></div>
      <div class="field-row"><div class="field-label">Mensagem</div><input class="field-input" id="testMessage" value="E aí, tudo certo?"></div>
      <div class="field-row" style="padding-bottom:6px;"><div class="field-label">Canal</div></div>
      <div class="mic-seg" id="testChannelSeg">
        <button data-ch="local" class="active">Local</button>
        <button data-ch="ooc">OOC</button>
        <button data-ch="admin">Admin</button>
        <button data-ch="sistema">Sistema</button>
        <button data-ch="erro">Erro</button>
      </div>
      <div class="side-item" id="btnSendTest">Enviar mensagem</div>
      <div class="side-item" id="btnSendBatch">Disparar conversa de exemplo</div>
      <div class="side-item" id="btnClear">Limpar chat</div>

      <div class="section-label">Canal do campo de digitação</div>
      <div class="mic-seg" id="inputChannelSeg">
        <button data-ch="local" class="active">Local</button>
        <button data-ch="ooc">OOC</button>
        <button data-ch="admin">Admin</button>
      </div>

      <div class="section-label">Aparência</div>
      <label class="vis-row"><span>Modo compacto</span><input type="checkbox" id="compactToggle"></label>
      <label class="vis-row"><span>Esmaecer quando inativo</span><input type="checkbox" id="fadeToggle" checked></label>
    </div>

    <div class="stage" id="stage">
      <div class="stage-hint">Digite no campo abaixo — experimente começar com "/"</div>

      <div class="chat-wrap">
        <div class="chat-log" id="chatLog"></div>

        <div class="chat-input-wrap">
          <div class="chat-suggestions" id="chatSuggestions"></div>
          <div class="chat-input-row">
            <span class="chat-channel-tag" id="chatChannelTag" title="Clique para trocar de canal">LOCAL</span>
            <input type="text" class="chat-input" id="chatInput" placeholder="Digite uma mensagem...">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chatLog = document.getElementById('chatLog');
    const chatInput = document.getElementById('chatInput');
    const chatChannelTag = document.getElementById('chatChannelTag');
    const suggestionsBox = document.getElementById('chatSuggestions');

    const CHANNEL_META = {
      local:{ tag:null, colorClass:'local' },
      ooc:{ tag:'OOC', colorClass:'ooc' },
      admin:{ tag:'ADMIN', colorClass:'admin' },
      sistema:{ tag:'SISTEMA', colorClass:'sistema' },
      erro:{ tag:'ERRO', colorClass:'erro' },
    };

    const COMMANDS = [
      { cmd:'/me', param:'<ação>', desc:'Executa uma ação em terceira pessoa' },
      { cmd:'/ooc', param:'<mensagem>', desc:'Envia uma mensagem fora de personagem' },
      { cmd:'/doc', param:'<mensagem>', desc:'Mensagem restrita à equipe (Dev/Admin)' },
      { cmd:'/tp', param:'<id>', desc:'Teleporta até o jogador informado' },
      { cmd:'/car', param:'<modelo>', desc:'Spawna um veículo pelo nome/modelo' },
      { cmd:'/report', param:'<motivo>', desc:'Abre um report para a staff' },
    ];

    let fadeEnabled = true;
    let fadeTimer = null;
    let currentSuggestions = [];
    const STATE = { testChannel:'local', inputChannel:'local' };

    function renderMessageRow(msg){
      const meta = CHANNEL_META[msg.channel];
      const row = document.createElement('div');
      row.className = 'chat-msg ' + meta.colorClass;
      if(meta.tag){
        const tag = document.createElement('span');
        tag.className = 'msg-tag';
        tag.textContent = '[' + meta.tag + ']';
        row.appendChild(tag);
      }
      if(msg.author){
        const author = document.createElement('span');
        author.className = 'msg-author';
        author.textContent = msg.author + ':';
        row.appendChild(author);
      }
      const text = document.createElement('span');
      text.className = 'msg-text';
      text.textContent = msg.text;
      row.appendChild(text);
      return row;
    }

    function addMessage(msg){
      chatLog.appendChild(renderMessageRow(msg));
      chatLog.scrollTop = chatLog.scrollHeight;
      scheduleFade();
    }

    function scheduleFade(){
      clearTimeout(fadeTimer);
      chatLog.classList.remove('faded');
      if(!fadeEnabled) return;
      fadeTimer = setTimeout(() => {
        if(document.activeElement !== chatInput){
          chatLog.classList.add('faded');
        }
      }, 4000);
    }

    /* ---------------- suggestions ---------------- */
    function renderSuggestions(list){
      currentSuggestions = list;
      suggestionsBox.innerHTML = '';
      if(list.length === 0){ hideSuggestions(); return; }
      list.forEach((c, i) => {
        const item = document.createElement('div');
        item.className = 'suggestion-item' + (i === 0 ? ' active' : '');
        const cmdEl = document.createElement('span');
        cmdEl.className = 'suggestion-cmd';
        cmdEl.textContent = c.cmd;
        const paramEl = document.createElement('span');
        paramEl.className = 'param';
        paramEl.textContent = c.param;
        cmdEl.appendChild(paramEl);
        const descEl = document.createElement('span');
        descEl.className = 'suggestion-desc';
        descEl.textContent = c.desc;
        item.appendChild(cmdEl);
        item.appendChild(descEl);
        item.addEventListener('mousedown', e => {
          e.preventDefault();
          chatInput.value = c.cmd + ' ';
          hideSuggestions();
          chatInput.focus();
        });
        suggestionsBox.appendChild(item);
      });
      suggestionsBox.classList.add('visible');
    }
    function hideSuggestions(){
      suggestionsBox.classList.remove('visible');
      currentSuggestions = [];
    }

    chatInput.addEventListener('input', () => {
      const val = chatInput.value;
      if(val.startsWith('/') && val.length > 0){
        const prefix = val.split(' ')[0];
        renderSuggestions(COMMANDS.filter(c => c.cmd.startsWith(prefix)));
      } else {
        hideSuggestions();
      }
    });

    chatInput.addEventListener('keydown', e => {
      if(e.key === 'Tab' && currentSuggestions.length){
        e.preventDefault();
        chatInput.value = currentSuggestions[0].cmd + ' ';
        hideSuggestions();
      } else if(e.key === 'Enter'){
        e.preventDefault();
        sendFromInput();
      } else if(e.key === 'Escape'){
        hideSuggestions();
      }
    });

    chatInput.addEventListener('focus', () => { clearTimeout(fadeTimer); chatLog.classList.remove('faded'); });
    chatInput.addEventListener('blur', () => { hideSuggestions(); scheduleFade(); });

    function sendFromInput(){
      const text = chatInput.value.trim();
      if(!text) return;
      const isCommand = text.startsWith('/');
      addMessage({
        channel: isCommand ? 'sistema' : STATE.inputChannel,
        author: isCommand ? null : 'Você',
        text: isCommand ? `Comando executado: ${text}` : text,
      });
      chatInput.value = '';
      hideSuggestions();
    }

    /* ---------------- channel controls ---------------- */
    function updateChannelTag(){
      chatChannelTag.textContent = STATE.inputChannel.toUpperCase();
    }
    document.querySelectorAll('#inputChannelSeg button').forEach(btn => {
      btn.addEventListener('click', () => {
        STATE.inputChannel = btn.dataset.ch;
        document.querySelectorAll('#inputChannelSeg button').forEach(b => b.classList.toggle('active', b === btn));
        updateChannelTag();
      });
    });
    const CYCLE = ['local', 'ooc', 'admin'];
    chatChannelTag.addEventListener('click', () => {
      const idx = CYCLE.indexOf(STATE.inputChannel);
      STATE.inputChannel = CYCLE[(idx + 1) % CYCLE.length];
      updateChannelTag();
      document.querySelectorAll('#inputChannelSeg button').forEach(b => b.classList.toggle('active', b.dataset.ch === STATE.inputChannel));
    });

    document.querySelectorAll('#testChannelSeg button').forEach(btn => {
      btn.addEventListener('click', () => {
        STATE.testChannel = btn.dataset.ch;
        document.querySelectorAll('#testChannelSeg button').forEach(b => b.classList.toggle('active', b === btn));
      });
    });

    /* ---------------- sidebar test actions ---------------- */
    document.getElementById('btnSendTest').addEventListener('click', () => {
      const author = document.getElementById('testAuthor').value || 'Jogador';
      const text = document.getElementById('testMessage').value || '...';
      const noAuthor = STATE.testChannel === 'sistema' || STATE.testChannel === 'erro';
      addMessage({ channel: STATE.testChannel, author: noAuthor ? null : author, text });
    });

    document.getElementById('btnSendBatch').addEventListener('click', () => {
      [
        { channel:'sistema', text:'Bem-vindo ao servidor. Leia as regras em /regras.' },
        { channel:'local', author:'Marcus_Silva', text:'Bom dia, cidade!' },
        { channel:'local', author:'Ana_Costa', text:'Bom dia! Alguém sabe o preço da gasolina hoje?' },
        { channel:'ooc', author:'Ana_Costa', text:'brb 2 min' },
        { channel:'admin', author:'STAFF_Rick', text:'Servidor será reiniciado em 10 minutos.' },
        { channel:'erro', text:'Você não tem permissão para usar este comando.' },
      ].forEach(addMessage);
    });

    document.getElementById('btnClear').addEventListener('click', () => { chatLog.innerHTML = ''; });

    /* ---------------- appearance ---------------- */
    document.getElementById('compactToggle').addEventListener('change', e => {
      chatLog.classList.toggle('compact', e.target.checked);
    });
    document.getElementById('fadeToggle').addEventListener('change', e => {
      fadeEnabled = e.target.checked;
      if(!fadeEnabled){ clearTimeout(fadeTimer); chatLog.classList.remove('faded'); }
      else scheduleFade();
    });

    /* ---------------- init ---------------- */
    [
      { channel:'sistema', text:'Chat carregado. Digite /me, /ooc ou /report para testar.' },
      { channel:'local', author:'Marcus_Silva', text:'Alguém na oficina agora?' },
      { channel:'ooc', author:'Você', text:'só testando o novo chat aqui' },
    ].forEach(addMessage);
  </script>
</body>
</html>
