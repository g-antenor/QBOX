<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title></title>

  <!--
    Pagina servida ao jogador (ui_page). Substitui dist/ui.html de proposito.

    O TEMA ESTA EMBUTIDO ABAIXO, NAO EM UM ARQUIVO SEPARADO.

    Motivo: o tema ja falhou em chegar ao jogo duas vezes. Primeiro porque o
    build webpack (que geraria dist/index.css) nao roda neste servidor;
    depois porque o cache de NUI do cliente continuava servindo o CSS antigo.
    Inline nao tem fetch, nao tem cache e nao tem build - se a pagina carrega,
    o tema carrega junto.

    Fonte da verdade continua sendo html/index.css. Para regerar esta pagina
    depois de editar o CSS, rode na pasta do resource:
      node -e "const f=require('fs');f.writeFileSync('html/ui.html',f.readFileSync('html/ui.html','utf8').replace(/<style>[^]*</style>/,'<style>'+f.readFileSync('html/index.css','utf8')+'</style>'))"
  -->
  <link href="/html/vendor/latofonts.css" rel="stylesheet">
  <link href="/html/vendor/flexboxgrid.6.3.1.min.css" rel="stylesheet">
  <link href="/html/vendor/animate.3.5.2.min.css" rel="stylesheet">

  <style>/* ============================================================================
   Chat — "Crimson Edge" redesign (matches the ox_lib UI-kit model)
     --bg #0c0c0e  --panel #17161a  --edge #232025
     --text #e6e4e3  --text-dim #86828a  --text-faint #4c4850  --red #ff2438
   ============================================================================ */
:root {
  --panel: #17161a;
  --edge: #232025;
  --text: #e6e4e3;
  --text-dim: #86828a;
  --text-faint: #4c4850;
  --red: #ff2438;
}

/* cfx message text colours (kept, retuned to the palette) */
.color-0 { color: #e6e4e3; }
.color-1 { color: #ff2438; }
.color-2 { color: #99cc00; }
.color-3 { color: #ffbb33; }
.color-4 { color: #4a90d9; }
.color-5 { color: #4a90d9; }
.color-6 { color: #aa66cc; }
.color-8 { color: #ff2438; }
.color-9 { color: #cc0068; }

.gameColor-w { color: #e6e4e3; }
.gameColor-r { color: #ff2438; }
.gameColor-g { color: #3ddc84; }
.gameColor-y { color: #e0a83d; }
.gameColor-b { color: #4a90d9; }

* {
  font-family: 'Lato', sans-serif;
  margin: 0;
  padding: 0;
}

.no-grow { flex-grow: 0; }
em { font-style: normal; }

#app {
  font-family: 'Lato', Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: var(--text);
}

/* ---------------- message window (bottom-left) ---------------- */
.chat-window {
  position: absolute;
  top: auto;
  bottom: 8.5%;
  left: 1%;
  width: 30%;
  height: 20%;
  max-width: 1000px;
  background-color: rgba(15, 14, 16, 0.5);
  border-radius: 4px;
  -webkit-animation-duration: 2s;
}

.chat-messages {
  position: relative;
  height: 95%;
  font-size: 1.7vh;
  margin: 0;
  padding: 0.8vh 1vh;
  overflow-x: hidden;
  overflow-y: hidden;
}

/* Each message: dim text with a subtle accent bar on the left. */
.msg {
  margin-bottom: 0.35vh;
  padding-left: 0.8vh;
  border-left: 2px solid transparent;
  color: var(--text-dim);
  line-height: 1.5;
}

.multiline {
  margin-left: 4%;
  text-indent: -1.2rem;
  white-space: pre-line;
}

/* ---------------- input (below the window) ---------------- */
.chat-input {
  font-size: 1.6vh;
  position: absolute;
  top: auto;
  bottom: 4%;
  left: 1%;
  width: 30%;
  max-width: 1000px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column-reverse;
}

.chat-input > div.input {
  position: relative;
  display: flex;
  align-items: stretch;
  width: 100%;
  background-color: var(--panel);
  border: 1px solid var(--edge);
  border-radius: 4px;
  transition: border-color 0.12s ease;
}

.chat-input > div.input:focus-within {
  border-color: var(--red);
}

.chat-hide-state {
  text-transform: uppercase;
  margin-left: 0.05vw;
  margin-bottom: 0.4vh;
  font-size: 1.5vh;
  color: var(--text-faint);
}

/* channel/mode prefix chip */
.prefix {
  font-size: 1.5vh;
  height: 100%;
  vertical-align: middle;
  line-height: calc(1vh + 1vh + 1.85vh);
  padding: 0 0.9vh;
  text-transform: uppercase;
  font-weight: bold;
  letter-spacing: 0.05em;
  color: var(--red);
  display: inline-block;
}

textarea {
  font-size: 1.6vh;
  line-height: 1.85vh;
  display: block;
  box-sizing: content-box;
  padding: 1vh;
  padding-left: 0.5vh;
  color: var(--text);
  border-width: 0;
  height: 3.15%;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  background-color: transparent;
}

textarea:focus, input:focus { outline: none; }
textarea::placeholder { color: var(--text-faint); }

/* ---------------- suggestions (above the input) ---------------- */
.suggestions-wrap {
  margin-bottom: 0.6vh;
}

.suggestions {
  list-style-type: none;
  padding: 0.4vh 0;
  font-size: 1.55vh;
  box-sizing: border-box;
  color: var(--text);
  background-color: var(--panel);
  border: 1px solid var(--edge);
  border-radius: 4px;
  width: 100%;
  overflow: hidden;
}

.suggestion {
  margin-bottom: 0;
  padding: 0.7vh 1vh;
  border-bottom: 1px solid var(--edge);
}

.suggestion:last-child { border-bottom: none; }
.suggestion:hover { background-color: rgba(255, 36, 56, 0.06); }

.suggestion .param {
  color: var(--text-faint);
  margin-left: 0.4vh;
}

.help {
  display: block;
  margin-top: 0.2vh;
  color: var(--text-faint);
  font-size: 1.35vh;
}

.disabled { color: var(--text-faint); }

.hidden { opacity: 0; }
.hidden.animated { transition: opacity 1s; }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="/dist/chat.js"></script>
</body>
</html>
