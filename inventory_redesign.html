<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventário — Redesign</title>
<style>
  :root{
    --bg-world: #0a0a0c;
    --panel: #17161a;
    --panel-edge: #201d21;
    --header: #1c191d;
    --slot: #1c1a1e;
    --slot-border: #2a262b;
    --text: #ece9e7;
    --text-dim: #8d8890;
    --text-faint: #55505a;
    --neon: #ff1f3d;
    --neon-soft: rgba(255,31,61,.35);
    --neon-dim: rgba(255,31,61,.12);
    --ok: #3ddc84;
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background: var(--bg-world);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    overflow: hidden;
    position: relative;
    user-select: none;
  }

  /* ---------- world atmosphere ---------- */
  .world{
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 50% 20%, rgba(255,31,61,.05), transparent 55%),
      repeating-linear-gradient(0deg, rgba(255,255,255,.015) 0px, rgba(255,255,255,.015) 1px, transparent 1px, transparent 3px),
      linear-gradient(180deg, #0d0c0f 0%, #08070a 100%);
  }
  .world::after{
    content:"";
    position:absolute; inset:0;
    background: radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0) 0%, rgba(0,0,0,.65) 100%);
    pointer-events:none;
  }
  .scanline{
    position:absolute; inset:0; pointer-events:none; opacity:.5;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0px, transparent 2px, transparent 4px);
  }

  .hint{
    position:absolute; top:18px; left:50%; transform:translateX(-50%);
    font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color: var(--text-faint);
    padding:7px 14px;
    background: rgba(23,22,26,.7);
    border:1px solid var(--slot-border);
    border-radius: 3px;
    text-align:center;
    backdrop-filter: blur(3px);
  }
  .hint b{ color: var(--neon); font-weight:600; }

  /* ---------- stash markers dropped in world ---------- */
  .marker{
    position:absolute;
    width:34px; height:34px;
    border-radius:4px;
    background: linear-gradient(160deg, #201a1c, #131113);
    border:1px solid var(--neon-soft);
    display:flex; align-items:center; justify-content:center;
    font-size:15px;
    cursor:pointer;
    box-shadow: 0 0 0 rgba(255,31,61,0);
    transition: box-shadow .15s ease, transform .1s ease;
    animation: spawn .25s cubic-bezier(.2,1.4,.4,1);
  }
  .marker:hover{ transform: translateY(-2px); }
  .marker::before{
    content:"";
    position:absolute; top:-3px; right:-3px;
    width:8px; height:8px; border-radius:50%;
    background: var(--neon);
    box-shadow: 0 0 6px 1px var(--neon-soft);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .marker.open{ box-shadow: 0 0 0 2px var(--neon), 0 0 16px 2px var(--neon-soft); }
  .marker .tag{
    position:absolute; bottom:-17px; left:50%; transform:translateX(-50%);
    font-size:9px; letter-spacing:.06em; color:var(--text-dim); white-space:nowrap;
  }

  @keyframes pulse{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:.35; transform:scale(1.3); }
  }
  @keyframes spawn{
    from{ opacity:0; transform:scale(.4); }
    to{ opacity:1; transform:scale(1); }
  }
  @media (prefers-reduced-motion: reduce){
    .marker::before{ animation:none; }
    .marker{ animation:none; }
  }

  /* ---------- dock (bottom, centered) ---------- */
  .dock{
    position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
    display:flex; align-items:flex-end; gap:10px;
  }

  .panel{
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 5px;
    box-shadow: 0 12px 28px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.02);
    width: 268px;
    overflow: hidden;
    animation: rise .22s cubic-bezier(.2,1.2,.3,1);
  }
  @keyframes rise{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:translateY(0);} }

  .panel-header{
    background: var(--header);
    padding: 7px 10px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 1px solid var(--panel-edge);
  }
  .panel-title{
    font-size: 11px; font-weight:700; letter-spacing:.09em; text-transform:uppercase;
    color: var(--text);
    display:flex; align-items:center; gap:6px;
  }
  .panel-title .dot{ width:5px; height:5px; border-radius:50%; background:var(--neon); box-shadow:0 0 5px var(--neon-soft); }

  .weight-ring{
    --pct: 0;
    position:relative;
    width:26px; height:26px;
    border-radius:50%;
    flex:none;
    background: conic-gradient(var(--neon) calc(var(--pct)*1%), #2b2730 0);
    display:flex; align-items:center; justify-content:center;
    transition: background .25s ease;
  }
  .weight-ring::before{
    content:"";
    position:absolute; inset:2.5px;
    border-radius:50%;
    background: var(--header);
  }
  .weight-ring span{
    position:relative; z-index:1;
    font-size:7px; font-weight:700; letter-spacing:-.02em;
    font-family: ui-monospace, Consolas, monospace;
    color: var(--text);
  }
  .weight-ring.over{ background: conic-gradient(#ff4747 calc(var(--pct)*1%), #2b2730 0); }
  .weight-ring.over span{ color:#ff8484; }

  .grid{
    display:grid;
    grid-template-columns: repeat(5, 46px);
    grid-auto-rows: 46px;
    gap: 3px;
    padding: 8px;
  }

  .slot{
    position:relative;
    background: var(--slot);
    border: 1px solid var(--slot-border);
    border-radius: 3px;
    display:flex; align-items:center; justify-content:center;
    font-size: 18px;
    cursor: grab;
    transition: border-color .12s ease, box-shadow .12s ease, background .12s ease;
  }
  .slot:focus-visible{ outline: 2px solid var(--neon); outline-offset: 1px; }
  .slot.empty{ cursor: default; }
  .slot.filled:hover{
    border-color: var(--neon-soft);
    box-shadow: inset 0 0 0 1px var(--neon-dim), 0 0 8px rgba(255,31,61,.18);
  }
  .slot.drag-over{
    border-color: var(--neon);
    box-shadow: inset 0 0 0 1px var(--neon);
    background: var(--neon-dim);
  }
  .slot .qty{
    position:absolute; right:2px; bottom:1px;
    font-size: 9px; font-family: ui-monospace, Consolas, monospace;
    color: var(--text); background: rgba(0,0,0,.55);
    padding: 0 3px; border-radius:2px; line-height:1.4;
  }
  .slot .lbl{
    position:absolute; left:2px; top:1px;
    font-size:7px; letter-spacing:.02em; color: var(--text-faint);
    text-transform:uppercase; max-width:40px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
  }

  .empty-world-note{
    position:absolute; bottom:22px; right:24px;
    font-size:10px; color:var(--text-faint); letter-spacing:.05em;
  }
</style>
</head>
<body>

  <div class="world" id="world">
    <div class="scanline"></div>
  </div>

  <div class="hint">Arraste um item para fora do inventário para criar um <b>stash</b>. Clique no stash para abri-lo ao lado.</div>

  <div class="dock" id="dock"></div>

  <script>
    const GRID_SIZE = 20;
    const ITEM_LIB = {
      pistol:  { icon:'🔫', label:'Pistol',  weight: 1100 },
      bandage: { icon:'🩹', label:'Curativo', weight: 115 },
      burger:  { icon:'🍔', label:'Burger',  weight: 220 },
      water:   { icon:'💧', label:'Água',    weight: 500 },
      phone:   { icon:'📱', label:'Celular', weight: 190 },
      money:   { icon:'💵', label:'Dinheiro',weight: 0, stack:true },
      armor:   { icon:'🦺', label:'Colete',  weight: 3000 },
      ammo:    { icon:'🔺', label:'Munição', weight: 7, stack:true },
      keys:    { icon:'🗝️', label:'Chaves',  weight: 20 },
      radio:   { icon:'📻', label:'Rádio',   weight: 1000 },
    };
    const MAX_WEIGHT = 30000;

    function emptyGrid(){ return Array(GRID_SIZE).fill(null); }

    const player = {
      slots: emptyGrid(),
    };
    // seed a few items
    [
      ['pistol', 1, null],
      ['bandage', 3, null],
      ['burger', 5, 2],
      ['water', 6, 1],
      ['phone', 0, null],
      ['ammo', 12, 34],
      ['money', 13, 4200],
    ].forEach(([id, slot, qty]) => player.slots[slot] = { id, qty: qty || 1 });

    const stashes = []; // { id, x, y, slots:[], open:bool, el, markerEl }
    let stashCounter = 0;
    let openStashId = null;

    function calcWeight(slots){
      return slots.reduce((sum, s) => {
        if(!s) return sum;
        const def = ITEM_LIB[s.id];
        return sum + def.weight * (def.stack ? 1 : s.qty);
      }, 0);
    }

    function renderSlot(container, item, slotIndex, sourceType, sourceId){
      const el = document.createElement('div');
      el.className = 'slot' + (item ? ' filled' : ' empty');
      el.tabIndex = 0;
      el.dataset.slot = slotIndex;

      if(item){
        const def = ITEM_LIB[item.id];
        el.innerHTML = `${def.icon}<span class="lbl">${def.label}</span>` +
          (def.stack || item.qty > 1 ? `<span class="qty">${item.qty}x</span>` : '');
        el.draggable = true;
        el.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', JSON.stringify({ sourceType, sourceId, slotIndex }));
          e.dataTransfer.effectAllowed = 'move';
        });
      }

      el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
      el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
      el.addEventListener('drop', e => {
        e.preventDefault();
        el.classList.remove('drag-over');
        const data = JSON.parse(e.dataTransfer.getData('text/plain'));
        moveItem(data.sourceType, data.sourceId, data.slotIndex, sourceType, sourceId, slotIndex);
      });

      container.appendChild(el);
    }

    function getSlots(type, id){
      if(type === 'player') return player.slots;
      const st = stashes.find(s => s.id === id);
      return st ? st.slots : null;
    }

    function moveItem(fromType, fromId, fromSlot, toType, toId, toSlot){
      const fromSlots = getSlots(fromType, fromId);
      const toSlots = getSlots(toType, toId);
      if(!fromSlots || !toSlots) return;
      if(fromType === toType && fromId === toId && fromSlot === toSlot) return;

      const item = fromSlots[fromSlot];
      if(!item) return;
      const displaced = toSlots[toSlot];

      toSlots[toSlot] = item;
      fromSlots[fromSlot] = displaced || null;

      renderAll();
    }

    function renderPanel(title, slots, type, id){
      const panel = document.createElement('div');
      panel.className = 'panel';

      const weight = calcWeight(slots);
      const pct = Math.min(100, Math.round(weight / MAX_WEIGHT * 100));

      const header = document.createElement('div');
      header.className = 'panel-header';
      header.innerHTML = `
        <div class="panel-title"><span class="dot"></span>${title}</div>
        <div class="weight-ring${pct >= 90 ? ' over' : ''}" style="--pct:${pct}" title="${(weight/1000).toFixed(1)}/${(MAX_WEIGHT/1000).toFixed(0)}kg">
          <span>${pct}%</span>
        </div>
      `;
      panel.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'grid';
      slots.forEach((item, i) => renderSlot(grid, item, i, type, id));
      panel.appendChild(grid);

      return panel;
    }

    function renderMarker(stash){
      const el = document.createElement('div');
      el.className = 'marker' + (stash.id === openStashId ? ' open' : '');
      el.style.left = stash.x + 'px';
      el.style.top = stash.y + 'px';
      el.innerHTML = `📦<span class="tag">STASH-${String(stash.id).padStart(2,'0')}</span>`;
      el.addEventListener('click', () => {
        openStashId = (openStashId === stash.id) ? null : stash.id;
        renderAll();
      });
      el.addEventListener('dragover', e => e.preventDefault());
      el.addEventListener('drop', e => {
        e.preventDefault();
        const data = JSON.parse(e.dataTransfer.getData('text/plain'));
        const emptyIdx = stash.slots.findIndex(s => s === null);
        if(emptyIdx === -1) return;
        moveItem(data.sourceType, data.sourceId, data.slotIndex, 'stash', stash.id, emptyIdx);
      });
      return el;
    }

    function renderAll(){
      const world = document.getElementById('world');
      const dock = document.getElementById('dock');

      // clear markers (keep scanline)
      world.querySelectorAll('.marker').forEach(m => m.remove());
      stashes.forEach(s => world.appendChild(renderMarker(s)));

      dock.innerHTML = '';
      dock.appendChild(renderPanel('Inventário', player.slots, 'player', null));

      if(openStashId !== null){
        const stash = stashes.find(s => s.id === openStashId);
        if(stash) dock.appendChild(renderPanel(`Stash ${String(stash.id).padStart(2,'0')}`, stash.slots, 'stash', stash.id));
      }
    }

    // world acts as a drop target: dropping an item on empty world space spawns a stash there
    const world = document.getElementById('world');
    world.addEventListener('dragover', e => e.preventDefault());
    world.addEventListener('drop', e => {
      if(e.target.closest('.marker')) return;
      e.preventDefault();
      const data = JSON.parse(e.dataTransfer.getData('text/plain'));
      const fromSlots = getSlots(data.sourceType, data.sourceId);
      if(!fromSlots) return;
      const item = fromSlots[data.slotIndex];
      if(!item) return;

      fromSlots[data.slotIndex] = null;

      stashCounter += 1;
      const newSlots = emptyGrid();
      newSlots[0] = item;

      const rect = world.getBoundingClientRect();
      const x = Math.min(Math.max(e.clientX - rect.left, 30), rect.width - 60);
      const y = Math.min(Math.max(e.clientY - rect.top, 30), rect.height - 140);

      stashes.push({ id: stashCounter, x, y, slots: newSlots });
      openStashId = stashCounter;
      renderAll();
    });

    renderAll();
  </script>
</body>
</html>
