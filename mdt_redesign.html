<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MDT — Redesign</title>
<style>
  :root{
    --bg: #0c0c0e;
    --panel: #17161a;
    --edge: #232025;
    --text: #e6e4e3;
    --text-dim: #86828a;
    --text-faint: #4c4850;
    --red: #ff2438;
    --green: #3ddc84;
    --amber: #e0a83d;
    --blue: #4a90d9;
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    overflow:hidden;
    user-select:none;
  }
  .hidden{ display:none !important; }

  /* ---------- shell ---------- */
  .mdt-root{ height:100%; display:flex; flex-direction:column; }
  .dept-tabs{ display:flex; background:var(--panel); border-bottom:1px solid var(--edge); flex:none; }
  .dept-tab{ padding:13px 24px; font-size:12px; letter-spacing:.04em; text-transform:uppercase; color:var(--text-dim); cursor:pointer; border-bottom:2px solid transparent; display:flex; align-items:center; gap:8px; transition: color .12s ease, border-color .12s ease; }
  .dept-tab:hover{ color:var(--text); }
  .dept-tab.active{ color:var(--text); border-bottom-color:var(--red); }
  .dept-body{ flex:1; overflow:hidden; }
  .dept-view{ display:none; height:100%; }
  .dept-view.active{ display:flex; }

  /* ---------- nav sidebar ---------- */
  .sidebar{ width:220px; flex:none; background:var(--panel); border-right:1px solid var(--edge); overflow-y:auto; }
  .sidebar-title{ padding:16px 14px 3px; font-size:12px; font-weight:700; letter-spacing:.03em; color:var(--text); }
  .sidebar-sub{ padding:0 14px 12px; font-size:10.5px; color:var(--text-faint); line-height:1.4; }
  .section-label{ padding:13px 14px 6px; font-size:9px; letter-spacing:.09em; text-transform:uppercase; color:var(--text-faint); }
  .nav-item{ padding:9px 14px; font-size:12px; color:var(--text-dim); border-left:2px solid transparent; border-bottom:1px solid var(--edge); cursor:pointer; display:flex; align-items:center; gap:9px; transition: color .1s ease, border-color .1s ease, background .1s ease; }
  .nav-item:hover{ color:var(--text); border-left-color:var(--red); background:rgba(255,36,56,.05); }
  .nav-item.active{ color:var(--text); border-left-color:var(--red); background:rgba(255,36,56,.07); }

  /* ---------- generic form controls ---------- */
  .field-row{ padding:0 14px 12px; }
  .field-label{ font-size:10px; letter-spacing:.03em; text-transform:uppercase; color:var(--text-faint); margin-bottom:6px; display:block; }
  .field-input{ width:100%; background:#0f0e10; border:1px solid var(--edge); color:var(--text); font-size:12px; padding:7px 8px; border-radius:3px; font-family:inherit; }
  .field-input:focus{ outline:none; border-color:var(--red); }
  .field-input::placeholder{ color:var(--text-faint); }
  .textarea{ width:100%; background:#0f0e10; border:1px solid var(--edge); color:var(--text); font-size:12px; padding:8px; border-radius:3px; font-family:inherit; resize:vertical; min-height:64px; }
  .textarea:focus{ outline:none; border-color:var(--red); }
  .check-row{ display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-dim); cursor:pointer; margin-bottom:8px; }
  .check-row input{ accent-color:var(--red); }

  .mic-seg{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .mic-seg button{ flex:1 1 28%; padding:7px 0; font-size:10px; text-transform:uppercase; letter-spacing:.03em; background:transparent; border:1px solid var(--edge); color:var(--text-dim); border-radius:3px; cursor:pointer; }
  .mic-seg button.active{ border-color:var(--red); color:var(--text); background:rgba(255,36,56,.08); }

  .btn{ padding:9px 14px; font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; border-radius:3px; border:1px solid var(--edge); background:transparent; color:var(--text-dim); cursor:pointer; transition: border-color .1s ease, color .1s ease, background .1s ease; display:inline-block; }
  .btn:hover{ color:var(--text); border-color:var(--text-faint); }
  .btn.primary{ background:var(--red); border-color:var(--red); color:#fff; }
  .btn.primary:hover{ background:#e01d30; }
  .btn.primary:disabled{ opacity:.35; cursor:not-allowed; }
  .btn.block{ width:100%; text-align:center; }

  /* ---------- stage ---------- */
  .stage{ flex:1; background: linear-gradient(180deg,#0e0d10,#0a090b); overflow-y:auto; padding:20px 24px; }
  .stage-header{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:16px; }
  .page-title{ font-size:14px; font-weight:700; letter-spacing:.03em; color:var(--text); margin-bottom:16px; }
  .stage-title{ font-size:13px; font-weight:700; letter-spacing:.03em; color:var(--text); margin-bottom:12px; }
  .search-input{ width:220px; background:#0f0e10; border:1px solid var(--edge); color:var(--text); font-size:12px; padding:8px 10px; border-radius:3px; font-family:inherit; }
  .search-input:focus{ outline:none; border-color:var(--red); }
  .empty-note{ font-size:11px; color:var(--text-faint); text-align:center; padding:30px 0; }

  /* ---------- dashboard ---------- */
  .dash-grid{ display:grid; grid-template-columns:1.3fr 1fr; gap:18px; }
  .dash-col-title{ font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-faint); margin-bottom:10px; }
  .call-item{ background:var(--panel); border:1px solid var(--edge); border-left:2px solid var(--edge); border-radius:4px; padding:10px 12px; margin-bottom:8px; }
  .call-item.alta{ border-left-color:var(--red); }
  .call-item.media{ border-left-color:var(--amber); }
  .call-item.baixa{ border-left-color:var(--text-faint); }
  .call-title{ font-size:11.5px; color:var(--text); font-weight:600; display:flex; justify-content:space-between; gap:8px; }
  .call-meta{ font-size:9.5px; color:var(--text-faint); margin-top:3px; }
  .online-item{ display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--edge); font-size:11.5px; }
  .online-item:last-child{ border-bottom:none; }
  .online-name{ color:var(--text); }
  .online-status{ font-size:9.5px; color:var(--text-faint); }
  .online-dot{ width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-right:6px; }

  /* ---------- profile / badge / record ---------- */
  .profile-card{ background:var(--panel); border:1px solid var(--edge); border-radius:5px; padding:16px; margin-bottom:16px; }
  .profile-header{ display:flex; gap:14px; align-items:center; margin-bottom:12px; }
  .profile-avatar{ width:50px; height:50px; border-radius:50%; background:var(--edge); display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--text-faint); flex:none; }
  .profile-name{ font-size:14px; font-weight:700; color:var(--text); }
  .profile-sub{ font-size:11px; color:var(--text-faint); margin-top:2px; }
  .profile-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px 16px; margin:12px 0; }
  .profile-field .k{ display:block; color:var(--text-faint); text-transform:uppercase; font-size:9px; letter-spacing:.04em; margin-bottom:3px; }
  .profile-field .v{ color:var(--text); font-size:12px; }

  .badge{ display:inline-flex; align-items:center; gap:5px; font-size:10px; letter-spacing:.03em; text-transform:uppercase; padding:3px 8px; border-radius:3px; border:1px solid var(--edge); color:var(--text-dim); }
  .badge::before{ content:""; width:5px; height:5px; border-radius:50%; background:var(--text-faint); }
  .badge.ok{ color:var(--green); border-color:rgba(61,220,132,.3); } .badge.ok::before{ background:var(--green); }
  .badge.warn{ color:var(--amber); border-color:rgba(224,168,61,.3); } .badge.warn::before{ background:var(--amber); }
  .badge.danger{ color:var(--red); border-color:rgba(255,36,56,.3); } .badge.danger::before{ background:var(--red); box-shadow:0 0 5px rgba(255,36,56,.5); }

  .record-list{ display:flex; flex-direction:column; gap:8px; }
  .record-item{ background:var(--panel); border:1px solid var(--edge); border-left:2px solid var(--edge); border-radius:4px; padding:10px 12px; }
  .record-item.danger{ border-left-color:var(--red); }
  .record-title{ font-size:12px; color:var(--text); font-weight:600; display:flex; justify-content:space-between; gap:8px; }
  .record-meta{ font-size:9.5px; color:var(--text-faint); margin-top:2px; }
  .record-desc{ font-size:11px; color:var(--text-dim); margin-top:6px; line-height:1.5; }

  .section-block{ margin-bottom:18px; }
  .section-block-title{ font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-faint); margin-bottom:8px; }

  /* ---------- accordion ---------- */
  .accordion-item{ border:1px solid var(--edge); border-radius:4px; margin-bottom:6px; overflow:hidden; }
  .accordion-head{ padding:9px 12px; font-size:11.5px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; background:var(--panel); color:var(--text); }
  .accordion-head:hover{ background:rgba(255,36,56,.05); }
  .accordion-head .arrow{ color:var(--text-faint); transition: transform .15s ease; }
  .accordion-item.open .arrow{ transform:rotate(90deg); color:var(--red); }
  .accordion-body{ max-height:0; overflow:hidden; transition:max-height .18s ease; background:#121114; }
  .accordion-item.open .accordion-body{ max-height:220px; }
  .accordion-body-inner{ padding:10px 12px; font-size:11px; color:var(--text-dim); line-height:1.7; }

  /* ---------- multi-select search ---------- */
  .ms-wrap{ position:relative; margin-bottom:4px; }
  .ms-dropdown{ display:none; position:absolute; top:100%; left:0; right:0; background:var(--panel); border:1px solid var(--edge); border-radius:3px; max-height:180px; overflow-y:auto; z-index:20; margin-top:4px; }
  .ms-dropdown.visible{ display:block; }
  .ms-option{ padding:8px 10px; font-size:11.5px; cursor:pointer; display:flex; justify-content:space-between; border-bottom:1px solid var(--edge); color:var(--text-dim); }
  .ms-option:last-child{ border-bottom:none; }
  .ms-option:hover{ background:rgba(255,36,56,.06); color:var(--text); }
  .ms-chips{ display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
  .chip{ background:var(--panel); border:1px solid var(--edge); border-radius:3px; padding:4px 8px; font-size:10.5px; display:flex; align-items:center; gap:7px; color:var(--text); }
  .chip .x{ cursor:pointer; color:var(--text-faint); }
  .chip .x:hover{ color:var(--red); }
  .ms-total{ font-size:12px; font-weight:700; color:var(--text); margin:8px 0 14px; }
  .ms-total span{ color:var(--red); }

  /* ---------- body diagram (hospital) ---------- */
  .body-diagram{ width:110px; height:210px; position:relative; margin:0 auto; }
  .bp{ position:absolute; background:var(--edge); border:1px solid var(--text-faint); cursor:pointer; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--text-faint); transition:border-color .12s ease, background .12s ease; }
  .bp[data-sev="1"]{ border-color:var(--red); background:rgba(255,36,56,.16); color:var(--text); }
  .bp[data-sev="2"]{ border-color:var(--red); background:rgba(255,36,56,.32); color:var(--text); }
  .bp[data-sev="3"]{ border-color:var(--red); background:rgba(255,36,56,.55); color:var(--text); }
  .bp-head{ top:0; left:50%; margin-left:-16px; width:32px; height:32px; border-radius:50%; }
  .bp-torso{ top:34px; left:50%; margin-left:-26px; width:52px; height:68px; }
  .bp-armL{ top:38px; left:6px; width:16px; height:60px; }
  .bp-armR{ top:38px; right:6px; width:16px; height:60px; }
  .bp-legL{ top:104px; left:23px; width:20px; height:90px; }
  .bp-legR{ top:104px; right:23px; width:20px; height:90px; }

  /* ---------- car diagram (mecânica) ---------- */
  .car-diagram{ display:grid; grid-template-columns:1fr 1.6fr 1fr; grid-template-rows:auto auto auto auto auto auto; gap:4px; width:230px; margin:0 auto; }
  .car-part{ background:var(--edge); border:1px solid var(--text-faint); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:8.5px; color:var(--text-dim); text-align:center; padding:6px 3px; cursor:pointer; min-height:32px; line-height:1.2; transition:border-color .12s ease, background .12s ease, color .12s ease; }
  .car-part.selected{ border-color:var(--red); background:rgba(255,36,56,.18); color:var(--text); }
  .cp-bumper-f{ grid-column:1/4; grid-row:1; }
  .cp-hood{ grid-column:1/4; grid-row:2; position:relative; }
  .cp-motor{ position:absolute; top:4px; left:50%; transform:translateX(-50%); width:70px; height:22px; z-index:2; }
  .cp-doorFL{ grid-column:1; grid-row:3; }
  .cp-roof{ grid-column:2; grid-row:3/5; }
  .cp-doorFR{ grid-column:3; grid-row:3; }
  .cp-doorRL{ grid-column:1; grid-row:4; }
  .cp-doorRR{ grid-column:3; grid-row:4; }
  .cp-trunk{ grid-column:1/4; grid-row:5; }
  .cp-bumper-r{ grid-column:1/4; grid-row:6; }

  /* ---------- map / cameras / doc tabs ---------- */
  .map-mock{ position:relative; height:360px; background:#0f0e10; border:1px solid var(--edge); border-radius:4px; overflow:hidden; background-image:linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px); background-size:28px 28px; }
  .map-dot{ position:absolute; width:9px; height:9px; border-radius:50%; background:var(--red); box-shadow:0 0 6px rgba(255,36,56,.6); }
  .map-dot::after{ content:""; position:absolute; inset:-6px; border:1px solid rgba(255,36,56,.4); border-radius:50%; animation:mapPulse 1.8s ease-out infinite; }
  @keyframes mapPulse{ 0%{ transform:scale(.6); opacity:.8; } 100%{ transform:scale(2.4); opacity:0; } }
  .map-label{ position:absolute; font-size:9px; color:var(--text-dim); white-space:nowrap; transform:translate(9px,-5px); }
  .map-note{ font-size:10px; color:var(--text-faint); margin-top:10px; }

  .cam-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .cam-tile{ aspect-ratio:16/10; background:#0f0e10; border:1px solid var(--edge); border-radius:4px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; color:var(--text-faint); font-size:10px; cursor:pointer; }
  .cam-tile:hover{ border-color:var(--text-faint); }
  .cam-tile.active{ border-color:var(--red); color:var(--text); }
  .cam-preview{ height:220px; background:#0f0e10; border:1px solid var(--edge); border-radius:4px; display:flex; align-items:center; justify-content:center; color:var(--text-faint); font-size:12px; margin-bottom:16px; }

  .doc-tabs{ display:flex; gap:6px; margin-bottom:14px; }
  .doc-tab{ padding:7px 14px; font-size:10.5px; border:1px solid var(--edge); border-radius:3px; cursor:pointer; color:var(--text-dim); text-transform:uppercase; letter-spacing:.03em; }
  .doc-tab.active{ border-color:var(--red); color:var(--text); background:rgba(255,36,56,.08); }
  .doc-content{ font-size:12px; color:var(--text-dim); line-height:1.8; white-space:pre-line; max-width:560px; }

  /* ---------- receipt (mecânica) ---------- */
  .receipt-panel{ width:300px; flex:none; background:var(--panel); border-left:1px solid var(--edge); overflow-y:auto; padding:16px 14px 20px; }
  .receipt-paper{ background:#121114; border:1px dashed var(--edge); border-radius:2px; padding:16px 14px; font-family: ui-monospace, Consolas, monospace; position:relative; }
  .receipt-store{ font-size:13px; font-weight:700; letter-spacing:.05em; text-align:center; color:var(--text); }
  .receipt-meta{ font-size:9.5px; color:var(--text-faint); text-align:center; line-height:1.5; margin-top:4px; }
  .receipt-divider{ border-top:1px dashed var(--edge); margin:10px 0; }
  .receipt-items{ display:flex; flex-direction:column; gap:7px; }
  .receipt-row{ display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); padding:2px 0; }
  .receipt-row.total{ font-size:14px; font-weight:700; color:var(--text); margin-top:4px; }
  .receipt-row.total span:last-child{ color:var(--red); }
  .receipt-barcode{ height:28px; margin-top:12px; opacity:.55; background: repeating-linear-gradient(90deg, var(--text-faint) 0px, var(--text-faint) 2px, transparent 2px, transparent 4px, var(--text-faint) 4px, var(--text-faint) 5px, transparent 5px, transparent 9px); }
  .receipt-stamp{ position:absolute; top:18px; right:14px; border:2px solid var(--red); color:var(--red); font-size:11px; font-weight:700; letter-spacing:.06em; padding:4px 9px; border-radius:4px; transform:rotate(-8deg); opacity:.9; }
</style>
</head>

<script>
function fmt(v){ return 'R$ ' + v.toFixed(2).replace('.', ','); }
function esc(s){ const d=document.createElement('div'); d.textContent = s==null?'':String(s); return d.innerHTML; }

document.querySelectorAll('.dept-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.dept-tab').forEach(t => t.classList.toggle('active', t === tab));
    document.querySelectorAll('.dept-view').forEach(v => v.classList.toggle('active', v.id === 'view-' + tab.dataset.dept));
  });
});

function renderNav(navId, items, activeId, onClick){
  const nav = document.getElementById(navId);
  nav.innerHTML = '';
  items.forEach(it => {
    const el = document.createElement('div');
    el.className = 'nav-item' + (it.id === activeId ? ' active' : '');
    el.innerHTML = `<span>${it.icon}</span><span>${it.label}</span>`;
    el.addEventListener('click', () => onClick(it.id));
    nav.appendChild(el);
  });
}

function createMultiSelect({ inputEl, dropdownEl, chipsEl, totalEl, options, onChange }){
  let selected = [];
  function renderDropdown(term){
    const filtered = options.filter(o => !selected.includes(o.key) && o.label.toLowerCase().includes(term));
    dropdownEl.innerHTML = '';
    if(term === '' || filtered.length === 0){ dropdownEl.classList.remove('visible'); return; }
    filtered.forEach(o => {
      const item = document.createElement('div');
      item.className = 'ms-option';
      item.innerHTML = `<span>${esc(o.label)}</span><span>${o.value ? fmt(o.value) : ''}</span>`;
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        selected.push(o.key);
        inputEl.value = '';
        dropdownEl.classList.remove('visible');
        renderChips();
        if(onChange) onChange(selected);
      });
      dropdownEl.appendChild(item);
    });
    dropdownEl.classList.add('visible');
  }
  function renderChips(){
    chipsEl.innerHTML = '';
    selected.forEach(key => {
      const o = options.find(x => x.key === key);
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.innerHTML = `<span>${esc(o.label)}${o.value ? ' — ' + fmt(o.value) : ''}</span><span class="x">×</span>`;
      chip.querySelector('.x').addEventListener('click', () => {
        selected = selected.filter(k => k !== key);
        renderChips();
        if(onChange) onChange(selected);
      });
      chipsEl.appendChild(chip);
    });
    if(totalEl){
      const total = selected.reduce((s,key) => { const o = options.find(x => x.key === key); return s + (o.value || 0); }, 0);
      totalEl.innerHTML = `Total: <span>${fmt(total)}</span>`;
    }
  }
  inputEl.addEventListener('input', () => renderDropdown(inputEl.value.trim().toLowerCase()));
  inputEl.addEventListener('blur', () => setTimeout(() => dropdownEl.classList.remove('visible'), 150));
  renderChips();
  return { getSelected: () => selected.map(k => options.find(o => o.key === k)), reset: () => { selected = []; renderChips(); inputEl.value=''; } };
}

      const name = document.getElementById('csName').value.trim();
      if(!name) return;

      const reasons = reasonMs.getSelected().map(r => r.label);

      const term = document.getElementById('mecPlateInput').value.trim().toUpperCase();
      const found = VEHICLES_DB.find(v => v.plate === term);
      const area = document.getElementById('mecVehicleArea');
      if(!found){ area.innerHTML = '<div class="empty-note">Nenhum veículo encontrado com essa placa.</div>'; return; }
      currentVehicle = found;
      selectedParts = new Set();
      mecPaid = false;
      renderVehicleWork(area);
    });
  }

  function renderVehicleWork(area){
    const v = currentVehicle;
    area.innerHTML = `
      <div class="profile-card">
        <div class="profile-header"><div class="profile-avatar">🚗</div><div><div class="profile-name">${esc(v.plate)}</div><div class="profile-sub">${esc(v.model)} — ${esc(v.color)}</div></div></div>
        <div class="profile-grid"><div class="profile-field"><span class="k">Proprietário</span><span class="v">${esc(v.owner)}</span></div></div>
      </div>

      <div class="section-block">
        <div class="section-block-title">Selecione as partes reparadas</div>
        <div class="car-diagram" id="carDiagram">
          <div class="car-part cp-bumper-f" data-part="Para-choque Dianteiro">Para-choque D.</div>
          <div class="car-part cp-hood" data-part="Capô">Capô<div class="car-part cp-motor" data-part="Motor">Motor</div></div>
          <div class="car-part cp-doorFL" data-part="Porta Dianteira Esquerda">Porta Diant. E</div>
          <div class="car-part cp-roof" data-part="Teto">Teto</div>
          <div class="car-part cp-doorFR" data-part="Porta Dianteira Direita">Porta Diant. D</div>
          <div class="car-part cp-doorRL" data-part="Porta Traseira Esquerda">Porta Tras. E</div>
          <div class="car-part cp-doorRR" data-part="Porta Traseira Direita">Porta Tras. D</div>
          <div class="car-part cp-trunk" data-part="Porta-malas">Porta-malas</div>
          <div class="car-part cp-bumper-r" data-part="Para-choque Traseiro">Para-choque Tras.</div>
        </div>
      </div>

      <div class="section-block">
        <label class="field-label">Descrição</label>
        <textarea class="textarea" id="mecDesc" placeholder="Descreva o serviço realizado..."></textarea>
      </div>

      <label class="check-row"><input type="checkbox" id="mecTow"><span>Teve reboque? (+${fmt(TOW_FEE)})</span></label>
      <div class="field-row" style="padding-left:0; max-width:320px;">
        <label class="field-label">Cobrar de (se diferente do proprietário)</label>
        <input class="field-input" id="mecPlayerInput" placeholder="${esc(v.owner)}">
      </div>

      <div class="receipt-paper" style="max-width:320px; margin-bottom:14px;">
        <div class="receipt-stamp hidden" id="mecStamp">PAGO ✓</div>
        <div class="receipt-store">OFICINA MECÂNICA</div>
        <div class="receipt-meta">Ordem de Serviço — ${esc(v.plate)}</div>
        <div class="receipt-divider"></div>
        <div class="receipt-items" id="mecInvoiceItems"></div>
        <div class="receipt-divider"></div>
        <div class="receipt-row total"><span>TOTAL</span><span id="mecInvoiceTotal">R$ 0,00</span></div>
        <div class="receipt-barcode"></div>
      </div>

      <button class="btn primary" id="btnMecFinish">Gerar nota fiscal</button>
    `;

    document.querySelectorAll('#carDiagram [data-part]').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        if(mecPaid) return;
        const part = el.dataset.part;
        if(selectedParts.has(part)){ selectedParts.delete(part); el.classList.remove('selected'); }
        else { selectedParts.add(part); el.classList.add('selected'); }
        updateMecInvoice();
      });
    });
    document.getElementById('mecTow').addEventListener('change', updateMecInvoice);

    function getMecTotal(){
      let total = 0;
      selectedParts.forEach(p => total += PART_PRICES[p] || 0);
      if(document.getElementById('mecTow').checked) total += TOW_FEE;
      return total;
    }
    function updateMecInvoice(){
      const itemsBox = document.getElementById('mecInvoiceItems');
      if(selectedParts.size === 0){ itemsBox.innerHTML = '<div class="receipt-row"><span>Nenhuma peça selecionada</span><span></span></div>'; }
      else itemsBox.innerHTML = Array.from(selectedParts).map(p => `<div class="receipt-row"><span>${esc(p)}</span><span>${fmt(PART_PRICES[p] || 0)}</span></div>`).join('');
      if(document.getElementById('mecTow').checked) itemsBox.innerHTML += `<div class="receipt-row"><span>Reboque</span><span>${fmt(TOW_FEE)}</span></div>`;
      document.getElementById('mecInvoiceTotal').textContent = fmt(getMecTotal());
    }
    updateMecInvoice();

    document.getElementById('btnMecFinish').addEventListener('click', () => {
      if(mecPaid || selectedParts.size === 0) return;
      mecPaid = true;
      document.getElementById('mecStamp').classList.remove('hidden');
      REPAIRS.push({
        plate: v.plate, model: v.model,
        parts: Array.from(selectedParts),
        desc: document.getElementById('mecDesc').value.trim(),
        billedTo: document.getElementById('mecPlayerInput').value.trim() || v.owner,
        total: getMecTotal(),
        date: new Date().toLocaleString('pt-BR'),
      });
    });
  }

  function renderHistorico(c){
    c.innerHTML = `<div class="page-title">Histórico de conserto</div><div class="record-list" id="repairList"></div>`;
    const list = document.getElementById('repairList');
    if(REPAIRS.length === 0){ list.innerHTML = '<div class="empty-note">Nenhum conserto registrado ainda.</div>'; return; }
    REPAIRS.slice().reverse().forEach(r => {
      const item = document.createElement('div');
      item.className = 'record-item';
      item.innerHTML = `<div class="record-title">${esc(r.plate)} — ${esc(r.model)}<span>${fmt(r.total)}</span></div><div class="record-meta">${esc(r.date)} — Cobrado de: ${esc(r.billedTo)}</div><div class="record-desc">Peças: ${esc(r.parts.join(', ') || '—')}${r.desc ? '<br>' + esc(r.desc) : ''}</div>`;
      list.appendChild(item);
    });
  }

  renderNav('mecNav', NAV, activePage, go);
  render();
})();
</script>
</body>
</html>
