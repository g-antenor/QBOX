<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ox_target — Interação radial</title>
<style>
  :root{
    color-scheme:dark;
    --bg:#08090b;
    --panel:rgba(17,19,23,.9);
    --panel-strong:#15171b;
    --edge:#2a2e35;
    --edge-strong:#3a3f49;
    --text:#f4f5f7;
    --text-dim:#a5aab3;
    --text-faint:#6d737e;
    --accent:#e5484d;
    --accent-soft:rgba(229,72,77,.15);
    --shadow:0 18px 48px rgba(0,0,0,.36);
  }

  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    overflow:hidden;
    color:var(--text);
    background:var(--bg);
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    user-select:none;
  }

  button{font:inherit}
  button:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:3px;
  }

  .world{
    position:absolute;
    inset:0;
    overflow:hidden;
    background:
      radial-gradient(circle at 50% 45%,rgba(255,255,255,.035),transparent 30%),
      linear-gradient(180deg,#0d0f12,#08090b);
  }
  .world::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);
    background-size:30px 30px;
    opacity:.16;
    mask-image:linear-gradient(to bottom,#000,transparent 90%);
    pointer-events:none;
  }

  .hint{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    padding:7px 11px;
    border:1px solid var(--edge);
    border-radius:999px;
    background:rgba(12,14,17,.72);
    backdrop-filter:blur(10px);
    font-size:10px;
    color:var(--text-faint);
    white-space:nowrap;
  }

  /* targets */
  .hotspot{
    position:absolute;
    width:42px;
    height:42px;
    margin:-21px 0 0 -21px;
    display:grid;
    place-items:center;
    border:1px solid var(--edge);
    border-radius:12px;
    background:rgba(18,20,24,.9);
    color:var(--text-dim);
    cursor:pointer;
    box-shadow:0 8px 24px rgba(0,0,0,.2);
    transition:transform .14s ease,border-color .14s ease,background .14s ease,color .14s ease;
  }
  .hotspot:hover,
  .hotspot.targeted{
    transform:scale(1.08);
    border-color:var(--accent);
    color:var(--text);
    background:rgba(25,27,32,.96);
  }
  .hotspot svg{width:19px;height:19px}

  /* center reticle */
  .reticle-wrap{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    z-index:20;
    pointer-events:none;
  }
  .reticle{
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--text-faint);
    transition:background .14s ease,box-shadow .14s ease,transform .14s ease;
  }
  .reticle-wrap.active .reticle{
    background:var(--accent);
    transform:scale(1.15);
    box-shadow:0 0 0 6px var(--accent-soft);
  }
  .reticle-label{
    margin-top:12px;
    min-height:34px;
    display:flex;
    align-items:center;
    gap:7px;
    padding:7px 10px;
    border:1px solid transparent;
    border-radius:7px;
    color:var(--text-dim);
    font-size:11px;
    opacity:0;
    transform:translateY(-3px);
    transition:opacity .14s ease,transform .14s ease,border-color .14s ease,background .14s ease;
    white-space:nowrap;
  }
  .reticle-wrap.active .reticle-label{
    opacity:1;
    transform:translateY(0);
    border-color:var(--edge);
    background:rgba(15,17,20,.8);
    backdrop-filter:blur(10px);
  }
  .reticle-label strong{color:var(--text);font-weight:650}
  .reticle-label .dist{
    color:var(--text-faint);
    font-family:ui-monospace,SFMono-Regular,Consolas,monospace;
  }

  /* radial interaction */
  .radial{
    --size:290px;
    position:fixed;
    left:50%;
    top:50%;
    width:var(--size);
    height:var(--size);
    transform:translate(-50%,-50%);
    z-index:40;
    opacity:0;
    animation:radialIn .16s ease forwards;
  }
  @keyframes radialIn{
    from{opacity:0;transform:translate(-50%,-50%) scale(.92)}
    to{opacity:1;transform:translate(-50%,-50%) scale(1)}
  }
  .radial-ring{
    position:absolute;
    inset:42px;
    border:1px solid rgba(255,255,255,.07);
    border-radius:50%;
    pointer-events:none;
  }
  .radial-ring::before{
    content:"";
    position:absolute;
    inset:24px;
    border:1px solid rgba(255,255,255,.04);
    border-radius:50%;
  }
  .radial-center{
    position:absolute;
    left:50%;
    top:50%;
    width:78px;
    height:78px;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;
    border:1px solid var(--edge-strong);
    border-radius:50%;
    background:rgba(15,17,20,.97);
    box-shadow:var(--shadow);
    backdrop-filter:blur(18px);
    pointer-events:none;
  }
  .radial-center::before{
    content:"";
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 5px var(--accent-soft);
  }
  .radial-center strong{
    max-width:62px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font-size:10px;
    font-weight:650;
  }
  .radial-center span{
    font-size:8px;
    color:var(--text-faint);
  }

  .radial-option{
    --angle:0deg;
    --radius:105px;
    position:absolute;
    left:50%;
    top:50%;
    width:76px;
    min-height:58px;
    transform:
      translate(-50%,-50%)
      rotate(var(--angle))
      translateY(calc(var(--radius) * -1))
      rotate(calc(var(--angle) * -1));
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:5px;
    padding:8px 7px;
    border:1px solid var(--edge);
    border-radius:10px;
    background:rgba(20,22,26,.94);
    color:var(--text-dim);
    box-shadow:0 10px 28px rgba(0,0,0,.25);
    backdrop-filter:blur(14px);
    cursor:pointer;
    transition:background .12s ease,border-color .12s ease,color .12s ease,transform .12s ease;
  }
  .radial-option:hover,
  .radial-option.active{
    color:var(--text);
    border-color:var(--accent);
    background:rgba(27,29,35,.98);
  }
  .radial-option:active{
    transform:
      translate(-50%,-50%)
      rotate(var(--angle))
      translateY(calc(var(--radius) * -1))
      rotate(calc(var(--angle) * -1))
      scale(.96);
  }
  .radial-option svg{
    width:18px;
    height:18px;
    color:var(--accent);
  }
  .radial-option span{
    max-width:64px;
    font-size:9px;
    line-height:1.2;
    text-align:center;
  }
  .radial-index{
    position:absolute;
    top:5px;
    right:6px;
    font-size:8px!important;
    color:var(--text-faint)!important;
    font-family:ui-monospace,SFMono-Regular,Consolas,monospace;
  }

  .radial-help{
    position:absolute;
    left:50%;
    bottom:-7px;
    transform:translateX(-50%);
    font-size:9px;
    color:var(--text-faint);
    white-space:nowrap;
  }

  .toast{
    position:absolute;
    top:58px;
    left:50%;
    transform:translateX(-50%);
    z-index:80;
    min-width:220px;
    padding:9px 12px;
    border:1px solid var(--edge);
    border-left:3px solid var(--accent);
    border-radius:7px;
    background:rgba(18,20,24,.94);
    color:var(--text-dim);
    box-shadow:0 12px 30px rgba(0,0,0,.28);
    backdrop-filter:blur(14px);
    font-size:11px;
    text-align:center;
    opacity:0;
    transition:opacity .15s ease,transform .15s ease;
    pointer-events:none;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(3px);
  }

  @media (max-width:600px){
    .radial{--size:250px}
    .radial-option{--radius:90px;width:68px;min-height:54px}
  }
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{
      animation-duration:.001ms!important;
      transition-duration:.001ms!important;
    }
  }
</style>
</head>
<body>
  <div class="world" id="world"></div>
  <div class="hint">Passe sobre um alvo · clique para abrir o radial · 1–9 seleciona · Esc fecha</div>

  <div class="reticle-wrap" id="reticleWrap">
    <div class="reticle"></div>
    <div class="reticle-label" id="reticleLabel" aria-live="polite"></div>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

<script>
  const icon = name => {
    const icons = {
      trunk:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M4 9h16v10H4z"/><path d="M8 9V6h8v3M9 14h6"/></svg>',
      dumpster:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M5 7h14l-1 13H6L5 7Z"/><path d="M8 7V4h8v3M3 7h18M9 11v5M15 11v5"/></svg>',
      ped:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="12" cy="5" r="2.5"/><path d="M8 21l1-7-2-4 3-2h4l3 2-2 4 1 7M9 14h6"/></svg>',
      action:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="12" cy="12" r="8"/><path d="m10 8 4 4-4 4"/></svg>'
    };
    return icons[name] || icons.action;
  };

  const TARGETS = [
    {
      id:'trunk', icon:'trunk', name:'Porta-malas', x:'25%', y:'62%', dist:'1.8m',
      options:['Abrir porta-malas','Trancar veículo','Revistar veículo']
    },
    {
      id:'dumpster', icon:'dumpster', name:'Lixeira', x:'74%', y:'68%', dist:'2.4m',
      options:['Vasculhar','Descartar item']
    },
    {
      id:'ped', icon:'ped', name:'Pedestre', x:'50%', y:'38%', dist:'1.2m',
      options:['Revistar bolso','Algemar','Conversar']
    }
  ];

  const world = document.getElementById('world');
  const reticleWrap = document.getElementById('reticleWrap');
  const reticleLabel = document.getElementById('reticleLabel');
  const toastEl = document.getElementById('toast');

  let currentTarget = null;
  let menuOpen = false;
  let activeIndex = 0;
  let toastTimer = null;

  function showToast(message){
    toastEl.textContent = message;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1700);
  }

  function setActive(target, element){
    if(menuOpen) return;
    currentTarget = target;
    reticleWrap.classList.add('active');
    reticleLabel.innerHTML = `<strong>${target.name}</strong><span class="dist">${target.dist}</span>`;
    document.querySelectorAll('.hotspot').forEach(item => item.classList.remove('targeted'));
    element.classList.add('targeted');
  }

  function clearActive(){
    if(menuOpen) return;
    currentTarget = null;
    reticleWrap.classList.remove('active');
    reticleLabel.textContent = '';
    document.querySelectorAll('.hotspot').forEach(item => item.classList.remove('targeted'));
  }

  function renderHotspots(){
    TARGETS.forEach(target => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'hotspot';
      button.style.left = target.x;
      button.style.top = target.y;
      button.innerHTML = icon(target.icon);
      button.setAttribute('aria-label', `${target.name}, ${target.dist}`);

      button.addEventListener('mouseenter', () => setActive(target, button));
      button.addEventListener('focus', () => setActive(target, button));
      button.addEventListener('mouseleave', clearActive);
      button.addEventListener('blur', clearActive);
      button.addEventListener('click', () => openRadial(target));

      world.appendChild(button);
    });
  }

  function setRadialFocus(index){
    const items = [...document.querySelectorAll('.radial-option')];
    if(!items.length) return;
    activeIndex = (index + items.length) % items.length;
    items.forEach((item,i) => item.classList.toggle('active', i === activeIndex));
    items[activeIndex].focus();
  }

  function chooseOption(label){
    closeRadial();
    showToast(`Executando: ${label}`);
  }

  function openRadial(target){
    closeRadial(false);
    menuOpen = true;
    currentTarget = target;
    reticleWrap.classList.add('active');
    reticleLabel.innerHTML = `<strong>${target.name}</strong><span class="dist">${target.dist}</span>`;

    const radial = document.createElement('div');
    radial.className = 'radial';
    radial.id = 'targetRadial';
    radial.setAttribute('role','menu');
    radial.setAttribute('aria-label',`Interações com ${target.name}`);

    radial.innerHTML = `
      <div class="radial-ring"></div>
      <div class="radial-center">
        ${icon(target.icon)}
        <strong>${target.name}</strong>
        <span>${target.dist}</span>
      </div>
      <div class="radial-help">Mouse, setas ou números para selecionar</div>
    `;

    const count = target.options.length;
    target.options.forEach((label,index) => {
      const option = document.createElement('button');
      option.type = 'button';
      option.className = 'radial-option';
      option.style.setProperty('--angle', `${(360 / count) * index}deg`);
      option.setAttribute('role','menuitem');
      option.innerHTML = `${icon('action')}<span>${label}</span><span class="radial-index">${index + 1}</span>`;
      option.addEventListener('mouseenter', () => {
        activeIndex = index;
        document.querySelectorAll('.radial-option').forEach((item,i) => item.classList.toggle('active',i === index));
      });
      option.addEventListener('click', () => chooseOption(label));
      radial.appendChild(option);
    });

    document.body.appendChild(radial);
    requestAnimationFrame(() => setRadialFocus(0));
    document.addEventListener('pointerdown', outsideRadial);
  }

  function outsideRadial(event){
    const radial = document.getElementById('targetRadial');
    if(radial && !radial.contains(event.target) && !event.target.closest('.hotspot')){
      closeRadial();
    }
  }

  function closeRadial(clear=true){
    const radial = document.getElementById('targetRadial');
    if(radial) radial.remove();
    document.removeEventListener('pointerdown', outsideRadial);
    menuOpen = false;
    if(clear) clearActive();
  }

  document.addEventListener('keydown', event => {
    if(!menuOpen) return;
    const options = currentTarget?.options || [];

    if(event.key === 'Escape'){
      event.preventDefault();
      closeRadial();
      return;
    }
    if(event.key === 'ArrowRight' || event.key === 'ArrowDown'){
      event.preventDefault();
      setRadialFocus(activeIndex + 1);
      return;
    }
    if(event.key === 'ArrowLeft' || event.key === 'ArrowUp'){
      event.preventDefault();
      setRadialFocus(activeIndex - 1);
      return;
    }
    if(/^[1-9]$/.test(event.key)){
      const index = Number(event.key) - 1;
      if(options[index]){
        event.preventDefault();
        chooseOption(options[index]);
      }
    }
  });

  renderHotspots();
</script>
</body>
</html>
