<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 140" role="img" aria-labelledby="title">
  <title id="title">NV2</title>
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#24112d"/>
      <stop offset="1" stop-color="#09070d"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-40%" width="160%" height="190%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#ff2438" flood-opacity=".28"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="skewX(-7)">
    <text x="27" y="108" font-family="Arial Black, Arial, sans-serif" font-size="104" font-weight="900"
      letter-spacing="-10" fill="none" stroke="#050308" stroke-width="12" stroke-linejoin="round">NV2</text>
    <text x="27" y="108" font-family="Arial Black, Arial, sans-serif" font-size="104" font-weight="900"
      letter-spacing="-10" fill="url(#face)" stroke="#ff2438" stroke-width="5" stroke-linejoin="round"
      paint-order="stroke fill" filter="url(#glow)">NV2</text>
  </g>
</svg>
