<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nv_mdt</title>
    <link rel="stylesheet" href="style.css?v=8" />
  </head>
  <body>
    <div id="root" class="mdt-root hidden">
      <div class="dept-body">
        <aside class="sidebar">
          <div class="sidebar-head">
            <div class="sidebar-title" id="sideTitle">MDT</div>
            <div class="sidebar-controls">
              <button id="deptSwitch" class="icon-btn hidden" title="Trocar departamento" aria-label="Trocar departamento">&#8943;</button>
              <button id="close" class="icon-btn" title="Fechar (ESC)" aria-label="Fechar">&#10005;</button>
            </div>
            <div id="deptTabs" class="dept-menu hidden"></div>
          </div>
          <div class="sidebar-sub" id="sideSub">&nbsp;</div>
          <div class="section-label">Menu</div>
          <div id="nav"></div>
        </aside>

        <main class="stage" id="stage"></main>
      </div>
    </div>

    <script src="app.js?v=6"></script>
  </body>
</html>
