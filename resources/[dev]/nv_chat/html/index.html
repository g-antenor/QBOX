<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>nv_chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="chat" id="chat">
    <div class="messages" id="messages"></div>

    <div class="input-row" id="inputRow">
      <span class="prefix" id="prefix">LOCAL</span>
      <input
        type="text"
        id="input"
        autocomplete="off"
        spellcheck="false"
        placeholder="Digite sua mensagem ou /adm, /dm, /alerta"
      />
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
